<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#10b981" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Pattern overlay -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="80" fill="white"/>
    <circle cx="1100" cy="530" r="120" fill="white"/>
    <circle cx="600" cy="315" r="200" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Logo and text -->
  <g transform="translate(600, 315)">
    <!-- Logo -->
    <rect x="-60" y="-80" width="120" height="120" rx="30" fill="white" opacity="0.95"/>
    <circle cx="0" cy="-20" r="30" fill="url(#bg-gradient)" opacity="0.9"/>
    
    <!-- Title -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle">doha.kr</text>
    
    <!-- Subtitle -->
    <text x="0" y="130" font-family="Arial, sans-serif" font-size="32" font-weight="400" fill="white" text-anchor="middle" opacity="0.9">일상을 더 재미있게 만드는 공간</text>
  </g>
</svg>