<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- 보라색 그라데이션 배경 -->
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B3FF2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#purpleGradient)"/>
  
  <!-- 로고 텍스트 -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">doha.kr</text>
  
  <!-- 슬로건 -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle" opacity="0.9">일상을 더 재미있게</text>
  
  <!-- 장식 요소 -->
  <circle cx="200" cy="150" r="50" fill="white" opacity="0.1"/>
  <circle cx="1000" cy="480" r="70" fill="white" opacity="0.1"/>
  <circle cx="150" cy="450" r="30" fill="white" opacity="0.1"/>
  <circle cx="1050" cy="180" r="40" fill="white" opacity="0.1"/>
</svg>