<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기 - doha.kr | 일상을 더 재미있게 만드는 공간</title>
    <meta name="description" content="doha.kr 사용 중 문의사항이나 개선 제안이 있으시면 언제든 연락주세요. 빠른 답변을 드리겠습니다.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="doha.kr 문의하기">
    <meta property="og:description" content="궁금한 점이나 개선 제안이 있으시면 언제든 연락주세요">
    <meta property="og:image" content="https://doha.kr/images/og-image.svg">
    <meta property="og:url" content="https://doha.kr/contact.html">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    
    <!-- Favicon -->
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7905640648499222" crossorigin="anonymous"></script>
    
    <style>
        .contact-hero {
            background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
            color: white;
            padding: 100px 20px;
            text-align: center;
        }
        
        .contact-content {
            max-width: 800px;
            margin: 80px auto;
            padding: 0 20px;
        }
        
        .contact-form {
            background: white;
            border-radius: 16px;
            padding: 48px;
            box-shadow: var(--shadow-md);
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .contact-info {
            background: #f9fafb;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }
        
        .contact-method {
            margin-bottom: 24px;
        }
        
        .contact-method h3 {
            color: #111827;
            margin-bottom: 8px;
        }
        
        .contact-method p {
            color: #374151;
        }
        
        /* Responsive AdSense Styles */
        .ad-container {
            min-height: 250px;
            margin: 40px auto;
            max-width: 1200px;
            padding: 0 20px;
            text-align: center;
        }
        
        .ad-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .adsbygoogle {
            min-height: 90px;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- 네비게이션 바 -->
    <div id="navbar-placeholder"></div>
    
    <!-- 히어로 섹션 -->
    <section class="contact-hero">
        <div class="hero-content">
            <h1 class="hero-title">문의하기</h1>
            <p class="hero-subtitle">
                궁금한 점이나 개선 제안이 있으시면 언제든 연락주세요
            </p>
        </div>
    </section>
    
    <!-- 문의 콘텐츠 -->
    <div class="contact-content">
        <!-- 문의 폼 -->
        <div class="contact-form">
            <h2 class="section-title">메시지 보내기</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">이름 *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">이메일 *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="subject">제목 *</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                
                <div class="form-group">
                    <label for="message">메시지 *</label>
                    <textarea id="message" name="message" placeholder="궁금한 점이나 개선 제안을 자유롭게 작성해주세요." required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">메시지 보내기</button>
            </form>
        </div>
        
        <!-- 연락처 정보 -->
        <div class="contact-info">
            <h2 class="section-title">연락처 정보</h2>
            <div class="contact-method">
                <h3>📧 이메일</h3>
                <p>hello@doha.kr</p>
            </div>
            <div class="contact-method">
                <h3>⏰ 응답 시간</h3>
                <p>평일 09:00 - 18:00 (주말 및 공휴일 제외)<br>1-2일 내 답변 드립니다</p>
            </div>
        </div>
    </div>
    
    <!-- 광고 영역 -->
    <div class="ad-container">
        <div class="ad-label">광고</div>
        <ins class="adsbygoogle"
             style="display:block; min-height: 90px;"
             data-ad-client="ca-pub-7905640648499222"
             data-ad-slot="2468135790"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
    
    <!-- 푸터 -->
    <div id="footer-placeholder"></div>
    
    <!-- External JavaScript -->
    <script src="/js/main.js"></script>
    
    <!-- 폼 처리 스크립트 -->
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 폼 데이터 수집
            const formData = new FormData(this);
            const data = {};
            for (let [key, value] of formData.entries()) {
                data[key] = value;
            }
            
            // 간단한 유효성 검사
            if (!data.name || !data.email || !data.subject || !data.message) {
                alert('모든 필수 항목을 입력해주세요.');
                return;
            }
            
            // 이메일 형식 검사
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(data.email)) {
                alert('올바른 이메일 주소를 입력해주세요.');
                return;
            }
            
            // 성공 메시지 (실제로는 서버로 전송)
            alert('메시지가 성공적으로 전송되었습니다. 빠른 시일 내에 답변드리겠습니다.');
            this.reset();
        });
    </script>
</body>
</html>
