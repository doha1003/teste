    <style>
        .calculator-container {
            max-width: 800px;

        .calculator-header p {

        }
        
        .calculator-form {
            background: white;

            transition: transform 0.2s;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
        }
        
        .result-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: none;
        }
        
        .result-container.show {
            display: block;
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border-radius: 8px;
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .result-item {
            padding: 20px;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .result-item h3 {
            margin: 0 0 10px 0;

            font-size: 1.1rem;
        }
        
        .result-item .amount {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }
        
        .deduction-details {
            margin-top: 20px;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 8px;
        }
        
        .deduction-details h3 {
            margin: 0 0 15px 0;
            color: #374151;
        }
        
        .deduction-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .deduction-item:last-child {
            border-bottom: none;
        }
        
        .share-section {
            text-align: center;
            margin-top: 30px;
        }
        
        .share-btn {
            background: #fee500;
            color: #3c1e1e;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 0 10px;
            transition: transform 0.2s;
        }
        
        .share-btn:hover {
            transform: translateY(-2px);
        }
        
        .copy-btn {
            background: #6b7280;
            color: white;
        }
        
        .ad-container {
            text-align: center;
            margin: 30px 0;
        }
        
        .ad-label {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        
        @media (max-width: 768px) {
            .calculator-header h1 {
                font-size: 2rem;
            }
            
            .calculator-form,
            .result-container {
                padding: 20px;
            }
            
            .result-grid {
                grid-template-columns: 1fr;
            }
        }

<body>
    <!-- 네비게이션 -->
    <div id="navbar-placeholder"></div>
    
    <div class="calculator-container">
        <div class="calculator-header">
            <h1>💰 월급 계산기</h1>
            <p>연봉을 입력하면 월급과 각종 공제액을 자동으로 계산해드립니다</p>
        </div>
        
        <!-- 광고 -->
        <div class="ad-container">
            <div class="ad-label">광고</div>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7905640648499222"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
        
        <div class="calculator-form">
            <div class="form-group">
                <label for="annualSalary">연봉 (원)</label>
                <input type="number" id="annualSalary" placeholder="예: 50000000" min="0">
            </div>
            
            <div class="form-group">
                <label for="dependents">부양가족 수 (본인 제외)</label>
                <input type="number" id="dependents" placeholder="0" min="0" max="20" value="0">
            </div>
            
            <button class="calculate-btn" onclick="calculateSalary()">계산하기</button>
        </div>
        
        <div class="result-container" id="resultContainer">
            <div class="result-header">
                <h2>💼 월급 계산 결과</h2>
                <p>연봉: <span id="displayAnnualSalary"></span>원</p>
            </div>
            
            <div class="result-grid">
                <div class="result-item">
                    <h3>세전 월급</h3>
                    <div class="amount" id="grossMonthlySalary">0원</div>
                </div>
                
                <div class="result-item">
                    <h3>세후 월급</h3>
                    <div class="amount" id="netMonthlySalary">0원</div>
                </div>
                
                <div class="result-item">
                    <h3>총 공제액</h3>
                    <div class="amount" id="totalDeductions">0원</div>
                </div>
            </div>
            
            <div class="deduction-details">
                <h3>📊 공제 내역</h3>
                <div class="deduction-item">
                    <span>근로소득세</span>
                    <span id="incomeTax">0원</span>
                </div>
                <div class="deduction-item">
                    <span>지방소득세</span>
                    <span id="localTax">0원</span>
                </div>
                <div class="deduction-item">
                    <span>국민연금</span>
                    <span id="pension">0원</span>
                </div>
                <div class="deduction-item">
                    <span>건강보험</span>
                    <span id="healthInsurance">0원</span>
                </div>
                <div class="deduction-item">
                    <span>고용보험</span>
                    <span id="employmentInsurance">0원</span>
                </div>
            </div>
            
            <div class="share-section">
                <p>내 월급 계산 결과를 공유해보세요!</p>
                <button class="share-btn" onclick="shareToKakao()">
                    💬 카카오톡 공유
                </button>
                <button class="share-btn copy-btn" onclick="copyResult()">
                    📋 결과 복사
                </button>
            </div>
        </div>
        
        <!-- 광고 -->
        <div class="ad-container">
            <div class="ad-label">광고</div>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7905640648499222"
                 data-ad-slot="2345678901"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>
    
    <!-- 푸터 -->
    <div id="footer-placeholder"></div>
    
    <!-- JavaScript -->
    <script src="/js/main.js"></script>
    
    <script>
        // 카카오 SDK 초기화
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                if (typeof Kakao !== 'undefined') {
                    try {
                        if (!Kakao.isInitialized()) {
                            Kakao.init('19d8ba832f94d513957adc17883c1282');
                            console.log('Kakao SDK initialized successfully');
                        }
                    } catch (error) {
                        console.error('Kakao SDK initialization error:', error);
                    }
                }
            }, 500);
        });
        
        // 현재 계산 결과 저장
        let currentCalculation = null;
        
        // 숫자 포맷팅 함수
        function formatNumber(number) {
            return number.toLocaleString('ko-KR');
        }
        
        // 월급 계산 함수
        function calculateSalary() {
            const annualSalary = parseInt(document.getElementById('annualSalary').value);
            const dependents = parseInt(document.getElementById('dependents').value) || 0;
            
            if (!annualSalary || annualSalary <= 0) {
                alert('연봉을 정확히 입력해주세요.');
                return;
            }
            
            // 세전 월급 계산
            const grossMonthlySalary = Math.floor(annualSalary / 12);
            
            // 각종 공제액 계산 (2024년 기준 간소화)
            const pension = Math.floor(grossMonthlySalary * 0.045); // 국민연금 4.5%
            const healthInsurance = Math.floor(grossMonthlySalary * 0.0354); // 건강보험 3.54%
            const employmentInsurance = Math.floor(grossMonthlySalary * 0.009); // 고용보험 0.9%
            
            // 근로소득세 계산 (간소화된 계산)
            let incomeTax = 0;
            const taxableIncome = annualSalary - (pension * 12) - (healthInsurance * 12) - (employmentInsurance * 12);
            
            if (taxableIncome > 12000000) {
                incomeTax = Math.floor((taxableIncome - 12000000) * 0.15 + 1080000);
            } else if (taxableIncome > 0) {
                incomeTax = Math.floor(taxableIncome * 0.06);
            }
            
            // 부양가족 공제 (1인당 연 150만원)
            incomeTax = Math.max(0, incomeTax - (dependents * 150000));
            
            const monthlyIncomeTax = Math.floor(incomeTax / 12);
            const localTax = Math.floor(monthlyIncomeTax * 0.1); // 지방소득세 10%
            
            const totalDeductions = pension + healthInsurance + employmentInsurance + monthlyIncomeTax + localTax;
            const netMonthlySalary = grossMonthlySalary - totalDeductions;
            
            // 결과 저장
            currentCalculation = {
                annualSalary,
                grossMonthlySalary,
                netMonthlySalary,
                totalDeductions,
                incomeTax: monthlyIncomeTax,
                localTax,
                pension,
                healthInsurance,
                employmentInsurance,
                dependents
            };
            
            // 결과 표시
            document.getElementById('displayAnnualSalary').textContent = formatNumber(annualSalary);
            document.getElementById('grossMonthlySalary').textContent = formatNumber(grossMonthlySalary) + '원';
            document.getElementById('netMonthlySalary').textContent = formatNumber(netMonthlySalary) + '원';
            document.getElementById('totalDeductions').textContent = formatNumber(totalDeductions) + '원';
            
            document.getElementById('incomeTax').textContent = formatNumber(monthlyIncomeTax) + '원';
            document.getElementById('localTax').textContent = formatNumber(localTax) + '원';
            document.getElementById('pension').textContent = formatNumber(pension) + '원';
            document.getElementById('healthInsurance').textContent = formatNumber(healthInsurance) + '원';
            document.getElementById('employmentInsurance').textContent = formatNumber(employmentInsurance) + '원';
            
            // 결과 컨테이너 표시
            document.getElementById('resultContainer').classList.add('show');
            
            // 결과 영역으로 스크롤
            document.getElementById('resultContainer').scrollIntoView({
                behavior: 'smooth'
            });
        }
        
        // 카카오톡 공유 함수
        function shareToKakao() {
            if (!currentCalculation) {
                alert('먼저 계산을 완료해주세요.');
                return;
            }
            
            if (typeof Kakao !== 'undefined' && Kakao.isInitialized()) {
                const { annualSalary, grossMonthlySalary, netMonthlySalary, totalDeductions } = currentCalculation;
                
                const description = `💰 연봉: ${formatNumber(annualSalary)}원
📊 세전 월급: ${formatNumber(grossMonthlySalary)}원
💸 세후 월급: ${formatNumber(netMonthlySalary)}원
📋 총 공제액: ${formatNumber(totalDeductions)}원

당신의 월급도 계산해보세요!`;
                
                Kakao.Share.sendDefault({
                    objectType: 'feed',
                    content: {
                        title: '💰 월급 계산기 결과',
                        description: description,
                        imageUrl: 'https://doha.kr/images/og-image.png',
                        link: {
                            mobileWebUrl: window.location.href,
                            webUrl: window.location.href
                        }
                    },
                    buttons: [
                        {
                            title: '나도 계산하기',
                            link: {
                                mobileWebUrl: 'https://doha.kr/tools/salary-calculator.html',
                                webUrl: 'https://doha.kr/tools/salary-calculator.html'
                            }
                        }
                    ]
                });
            } else {
                // 카카오 SDK 로드 실패시 링크 복사로 대체
                copyResult();
            }
        }
        
        // 결과 복사 함수
        function copyResult() {
            if (!currentCalculation) {
                alert('먼저 계산을 완료해주세요.');
                return;
            }
            
            const { annualSalary, grossMonthlySalary, netMonthlySalary, totalDeductions } = currentCalculation;
            
            const resultText = `💰 월급 계산 결과
연봉: ${formatNumber(annualSalary)}원
세전 월급: ${formatNumber(grossMonthlySalary)}원
세후 월급: ${formatNumber(netMonthlySalary)}원
총 공제액: ${formatNumber(totalDeductions)}원

doha.kr 월급 계산기
${window.location.href}`;
            
            navigator.clipboard.writeText(resultText).then(() => {
                alert('결과가 복사되었습니다!');
            }).catch(() => {
                // 클립보드 API 실패시 텍스트 영역을 이용한 복사
                const textArea = document.createElement('textarea');
                textArea.value = resultText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('결과가 복사되었습니다!');
            });
        }
        
        // 엔터키로 계산하기
        document.getElementById('annualSalary').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateSalary();
            }
        });
        
        document.getElementById('dependents').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateSalary();
            }
        });
    </script>
    
    <!-- AdSense initialization -->
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
