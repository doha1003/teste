<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Component - doha.kr</title>
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://pagead2.googlesyndication.com https://www.googletagmanager.com https://developers.kakao.com https://t1.kakaocdn.net https://ep2.adtrafficquality.google; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), accelerometer=(), gyroscope=()">
    
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav class="navbar">
    <div class="navbar-container">
        <a href="/" class="logo">doha.kr</a>
        <ul class="nav-menu" id="nav-menu">
            <li><a href="/" class="nav-link">홈</a></li>
            <li><a href="/tests/" class="nav-link">심리테스트</a></li>
            <li><a href="/fortune/" class="nav-link">운세</a></li>
            <li><a href="/tools/" class="nav-link">실용도구</a></li>
            <li><a href="/contact/" class="nav-link">문의</a></li>
            <li><a href="/about/" class="nav-link">소개</a></li>
        </ul>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-expanded="false" aria-controls="nav-menu" aria-label="메뉴 열기">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</nav>

<script>
function toggleMobileMenu() {
    const navLinks = document.querySelector('.nav-menu');
    const menuToggle = document.querySelector('.mobile-menu-btn');
    
    if (navLinks) {
        navLinks.classList.toggle('active');
        const isExpanded = navLinks.classList.contains('active');
        menuToggle.setAttribute('aria-expanded', isExpanded);
        menuToggle.setAttribute('aria-label', isExpanded ? '메뉴 닫기' : '메뉴 열기');
        // 햄버거 아이콘 애니메이션은 CSS로 처리
    }
}

// 페이지 로드 시 메뉴가 닫혀있도록 보장
document.addEventListener('DOMContentLoaded', function() {
    const navLinks = document.querySelector('.nav-menu');
    if (navLinks) {
        navLinks.classList.remove('active');
    }
});

// 클릭 외부 영역 클릭 시 메뉴 닫기
document.addEventListener('click', function(event) {
    const navLinks = document.querySelector('.nav-menu');
    const menuToggle = document.querySelector('.mobile-menu-btn');
    
    if (navLinks && navLinks.classList.contains('active')) {
        if (!navLinks.contains(event.target) && !menuToggle.contains(event.target)) {
            navLinks.classList.remove('active');
            menuToggle.setAttribute('aria-expanded', 'false');
            menuToggle.setAttribute('aria-label', '메뉴 열기');
        }
    }
});
</script>
</body>
</html>
