                option.classList.remove('selected');
            });
            
            // 선택된 옵션에 selected 클래스 추가
            event.target.closest('.teto-gender-option').classList.add('selected');
            
            // 시작 버튼 활성화
            document.getElementById('start-test-btn').disabled = false;
        }

                alert('성별을 선택해주세요.');
                return;
            }
            
            document.getElementById('gender-screen').classList.add('teto-hidden');
            document.getElementById('test-screen').classList.remove('teto-hidden');
            showQuestion();
        }

                document.getElementById('question').textContent = q.question;
                document.getElementById('progress-step').textContent = `STEP ${currentQuestion + 1}`;
                document.getElementById('progress-text').textContent = `질문 ${currentQuestion + 1} / ${testQuestions.length}`;
                document.getElementById('progress-percent').textContent = `${Math.round(((currentQuestion + 1) / testQuestions.length) * 100)}%`;
                document.getElementById('progress').style.width = `${((currentQuestion + 1) / testQuestions.length) * 100}%`;

                const optionsContainer = document.getElementById('options');
                optionsContainer.innerHTML = '';

                q.options.forEach((option, index) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'teto-option';
                    optionDiv.textContent = option.text;
                    optionDiv.onclick = () => selectOption(index);
                    
                    // 이전에 선택한 답변이 있으면 표시
                    if (answers[currentQuestion] && answers[currentQuestion].index === index) {
                        optionDiv.classList.add('selected');
                    }
                    
                    optionsContainer.appendChild(optionDiv);
                });

                // 네비게이션 버튼 표시/숨김
                document.getElementById('prev-btn').style.visibility = currentQuestion > 0 ? 'visible' : 'hidden';
                document.getElementById('next-btn').style.visibility = answers[currentQuestion] ? 'visible' : 'hidden';
            }
        }

        // 옵션 선택 (자동 넘김 기능 수정)
        function selectOption(optionIndex) {
            document.querySelectorAll('.teto-option').forEach(opt => opt.classList.remove('selected'));
            document.querySelectorAll('.teto-option')[optionIndex].classList.add('selected');

            selectedAnswerIndex = optionIndex;
            answers[currentQuestion] = {
                index: optionIndex,
                type: testQuestions[currentQuestion].options[optionIndex].type
            };
            
            document.getElementById('next-btn').style.visibility = 'visible';
            
            // 모든 질문에서 자동으로 다음으로 이동 (마지막 질문 포함)
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion >= testQuestions.length) {
                    showResult();
                } else {
                    showQuestion();
                }
            }, 800);
        }

        // 다음 질문
        function nextQuestion() {
            if (answers[currentQuestion]) {
                currentQuestion++;
                if (currentQuestion >= testQuestions.length) {
                    showResult();
                } else {
                    showQuestion();
                }
            }
        }

        // 이전 질문
        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        // 결과 표시 (애니메이션 강화)
        function showResult() {
            let tetoScore = 0;
            let egenScore = 0;

            answers.forEach(answer => {
                if (answer.type === 'teto') {
                    tetoScore++;
                } else {
                    egenScore++;
                }
            });

            const dominantType = tetoScore > egenScore ? 'teto' : 'egen';
            const resultKey = `${dominantType}_${selectedGender}`;
            const result = resultTypes[resultKey];

            document.getElementById('test-screen').classList.add('teto-hidden');
            document.getElementById('result-screen').classList.remove('teto-hidden');
            
            // 기본 정보 설정
            document.getElementById('card-avatar').textContent = result.avatar;
            document.getElementById('result-type').textContent = result.type;
            document.getElementById('result-description').textContent = result.description;
            document.getElementById('card-rarity').textContent = result.rarity;
            document.getElementById('card-rarity').className = `teto-card-rarity ${result.rarity}`;

            // 스탯 표시 (애니메이션 포함)
            const statsHtml = Object.entries(result.stats).map(([key, value]) => 
                `<div class="teto-stat-item">
                    <div class="teto-stat-label">${key}</div>
                    <div class="teto-stat-bar">
                        <div class="teto-stat-fill" style="width: ${value}%"></div>
                    </div>
                    <div class="teto-stat-value">${value}</div>
                </div>`
            ).join('');
            document.getElementById('card-stats').innerHTML = statsHtml;

            // 특성 카드 생성
            const traitsHtml = result.traits.map(trait => 
                `<div class="teto-trait-card">
                    <div class="teto-trait-title">${trait.title}</div>
                    <div class="teto-trait-desc">${trait.desc}</div>
                </div>`
            ).join('');
            document.getElementById('result-traits').innerHTML = traitsHtml;

            // 궁합 정보
            document.getElementById('compatibility').innerHTML = `
                <h3>💕 관계 호환성 분석</h3>
                <p>${result.compatibility}</p>
            `;

            // 상세 분석 추가
            document.getElementById('detailed-analysis').innerHTML = `
                <div class="teto-analysis-item">
                    <h4>💪 주요 강점</h4>
                    <p>${result.detailed.strength}</p>
                </div>
                <div class="teto-analysis-item">
                    <h4>⚠️ 주의할 점</h4>
                    <p>${result.detailed.weakness}</p>
                </div>
                <div class="teto-analysis-item">
                    <h4>🌱 성장 조언</h4>
                    <p>${result.detailed.advice}</p>
                </div>
                <div class="teto-analysis-item">
                    <h4>💼 추천 직업</h4>
                    <div class="teto-career-tags">
                        ${result.detailed.career.map(career => `<span class="teto-career-tag">${career}</span>`).join('')}
                    </div>
                </div>
            `;

            // 애니메이션 트리거
            setTimeout(() => {
                document.querySelectorAll('.animate-card, .animate-rarity, .animate-avatar, .animate-title, .animate-description, .animate-stats').forEach((el, index) => {
                    setTimeout(() => {
                        el.style.opacity = '1';
                        el.style.transform = 'translateY(0)';
                    }, index * 200);
                });
            }, 100);

            setTimeout(() => {
                document.querySelectorAll('.animate-traits, .animate-compatibility, .animate-analysis, .animate-share, .animate-navigation').forEach((el, index) => {
                    setTimeout(() => {
                        el.style.opacity = '1';
                        el.style.transform = 'translateY(0)';
                    }, index * 300);
                });
            }, 1000);

            // 광고 로드 - 결과 표시 후 지연 로드
            setTimeout(() => {
                const adContainer = document.getElementById('ad-container');
                if (adContainer) {
                    adContainer.style.display = 'flex';
                    try {
                        (adsbygoogle = window.adsbygoogle || []).push({});
                    } catch (error) {
                        console.log('AdSense 로드 실패:', error);
                        adContainer.style.display = 'none';
                    }
                }
            }, 2000);
        }

        // 카카오톡 공유하기
        function shareKakao() {
            if (typeof Kakao === 'undefined' || !Kakao.isInitialized()) {
                alert('카카오 SDK가 초기화되지 않았습니다.');
                return;
            }

            const resultType = document.getElementById('result-type').textContent;
            const resultDesc = document.getElementById('result-description').textContent;
            const currentUrl = window.location.href.split('?')[0]; // URL 파라미터 제거

            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: `✨ 나의 성격 유형: ${resultType}`,
                    description: `${resultDesc.substring(0, 60)}...`,
                    imageUrl: 'https://doha.kr/images/og-image.svg',
                    link: {
                        mobileWebUrl: currentUrl,
                        webUrl: currentUrl,
                    },
                },
                buttons: [
                    {
                        title: '나도 테스트하기',
                        link: {
                            mobileWebUrl: currentUrl,
                            webUrl: currentUrl,
                        },
                    },
                ],
            });
        }

        // 링크 복사
        function copyLink() {
            const url = window.location.href.split('?')[0]; // URL 파라미터 제거
            navigator.clipboard.writeText(url).then(() => {
                alert('링크가 복사되었습니다!');
            }).catch(() => {
                // 폴백 방법
                const textarea = document.createElement('textarea');
                textarea.value = url;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('링크가 복사되었습니다!');
            });
        }

        // 테스트 재시작
        function restartTest() {
            selectedGender = '';
            currentQuestion = 0;
            answers = [];
            selectedAnswerIndex = null;
            
            document.getElementById('result-screen').classList.add('teto-hidden');
            document.getElementById('gender-screen').classList.remove('teto-hidden');
            
            // 성별 선택 초기화
            document.querySelectorAll('.teto-gender-option').forEach(option => {
                option.classList.remove('selected');
            });
            document.getElementById('start-test-btn').disabled = true;
        }

        // 카카오 SDK 초기화 - 페이지 로드 후 안전하게 초기화
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                if (typeof Kakao !== 'undefined') {
                    try {
                        if (!Kakao.isInitialized()) {
                            Kakao.init('19d8ba832f94d513957adc17883c1282');
                            console.log('Kakao SDK initialized');
                        }
                    } catch (error) {
                        console.error('Kakao SDK initialization error:', error);
                    }
                }
            }, 100);
        });
    </script>

    <!-- 애니메이션 CSS -->

        /* 결과 화면 애니메이션 */
        .animate-card, .animate-rarity, .animate-avatar, .animate-title, 
        .animate-description, .animate-stats, .animate-traits, 
        .animate-compatibility, .animate-analysis, .animate-share, 
        .animate-navigation {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease-out;
        }

        /* 스탯 바 애니메이션 */
        .teto-stat-fill {
            animation: fillBar 1.5s ease-out forwards;
            animation-delay: 1s;
            width: 0 !important;
        }

        @keyframes fillBar {
            to {
                width: var(--target-width) !important;
            }
        }

        /* 카드 호버 효과 */

        }

        .teto-trait-card:hover {
            transform: translateY(-5px);

        /* 스탯 바 스타일 개선 */

        .teto-stat-fill {
