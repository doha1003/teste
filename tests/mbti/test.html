<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 성격유형 검사 - 16가지 성격 유형 테스트 | doha.kr</title>
    <meta name="description" content="24개의 심층적인 문항으로 정확하게 분석하는 MBTI 성격유형 검사. 16가지 성격 유형 중 당신의 유형을 찾아보세요.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="MBTI 성격유형 검사 - 나는 어떤 유형일까?">
    <meta property="og:description" content="24개의 심층적인 문항으로 정확하게 분석하는 MBTI 성격유형 검사">
    <meta property="og:image" content="https://doha.kr/images/og-default.png">
    <meta property="og:url" content="https://doha.kr/tests/mbti/test.html">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/pages/mbti-test.css">
    
    <!-- Favicon -->
    <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7905640648499222" crossorigin="anonymous"></script>
    
    <!-- Kakao JavaScript SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.4.0/kakao.min.js" integrity="sha384-mXVrIX2T/Kszp6Z0aEWaA8Nm7J6/ZeWXbL8UpGRjKwWe56Srd/iyNmWMBhcItAjH" crossorigin="anonymous"></script>
</head>
<body>
    <!-- 네비게이션 -->
    <div id="navbar-placeholder"></div>
    
    <div class="mbti-test-container">
        <div class="mbti-test-header">
            <h1>MBTI 성격유형 검사</h1>
            <p>24개 문항으로 알아보는 나의 성격 유형</p>
        </div>
        
        <div class="mbti-test-content">
            <!-- 테스트 시작 화면 -->
            <div id="intro-screen" class="mbti-intro-section">
                <h2 class="mbti-intro-title">MBTI 성격유형을 알아보세요!</h2>
                <p class="mbti-intro-text">
                    24개의 간단한 질문을 통해 당신의 MBTI 성격유형을 분석해드립니다.<br>
                    정확한 결과를 위해 솔직하게 답변해주세요.
                </p>
                <div class="mbti-intro-button-wrapper">
                    <button class="mbti-btn mbti-btn-primary mbti-start-button" onclick="startTest()">
                        테스트 시작하기
                    </button>
                </div>
            </div>
            
            <!-- 진행률 표시 -->
            <div id="progress-screen" class="mbti-progress-container" style="display: none;">
                <div class="mbti-progress-info">
                    <span class="mbti-progress-text">문항 <span id="currentQuestion">1</span>/24</span>
                    <span class="mbti-progress-percent" id="progressPercent">4%</span>
                </div>
                <div class="mbti-progress-bar">
                    <div class="mbti-progress-fill" id="progressFill"></div>
                </div>
            </div>
            
            <!-- 질문 화면 -->
            <div id="question-screen" class="mbti-question-container" style="display: none;">
                <div class="mbti-question-card">
                    <div class="mbti-question-number">
                        <span id="questionNumber">Q1</span>
                    </div>
                    <div class="mbti-question-text" id="questionText"></div>
                </div>
                
                <div class="mbti-options" id="optionsContainer"></div>
                
                <div class="mbti-navigation">
                    <button class="mbti-btn mbti-btn-secondary" id="prevBtn" onclick="previousQuestion()" style="visibility: hidden;">
                        이전
                    </button>
                    <button class="mbti-btn mbti-btn-primary" id="nextBtn" onclick="nextQuestion()" style="visibility: hidden;">
                        다음
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 결과 화면 -->
    <div class="mbti-result-container" id="resultContainer" style="display: none;">
        <div class="mbti-result-header">
            <div class="mbti-result-type" id="resultType"></div>
            <div class="mbti-result-title" id="resultTitle"></div>
            <div class="mbti-result-subtitle" id="resultSubtitle"></div>
            <div class="mbti-result-rarity" id="resultRarity"></div>
        </div>
        
        <div class="mbti-result-content">
            <!-- 성격 설명 -->
            <div class="mbti-result-section">
                <h3 class="mbti-section-title">
                    <span class="mbti-section-icon">🎭</span>
                    성격 특징
                </h3>
                <div class="mbti-personality-description" id="personalityDescription"></div>
            </div>
            
            <!-- 성향 분석 -->
            <div class="mbti-result-section">
                <h3 class="mbti-section-title">
                    <span class="mbti-section-icon">📊</span>
                    성향 분석
                </h3>
                <div class="mbti-traits-grid" id="traitsGrid"></div>
            </div>
            
            <!-- 유명인 -->
            <div class="mbti-result-section">
                <h3 class="mbti-section-title">
                    <span class="mbti-section-icon">⭐</span>
                    같은 유형의 유명인
                </h3>
                <div class="mbti-celebrities-grid" id="celebritiesGrid"></div>
            </div>
            
            <!-- 추천 직업 -->
            <div class="mbti-result-section">
                <h3 class="mbti-section-title">
                    <span class="mbti-section-icon">💼</span>
                    추천 직업
                </h3>
                <div class="mbti-careers-list" id="careersList"></div>
            </div>
            
            <!-- 연애 궁합 -->
            <div class="mbti-result-section">
                <h3 class="mbti-section-title">
                    <span class="mbti-section-icon">💕</span>
                    연애 궁합
                </h3>
                <div class="mbti-compatibility-section" id="compatibilitySection"></div>
            </div>
            
            <!-- 강점과 약점 -->
            <div class="mbti-result-section">
                <h3 class="mbti-section-title">
                    <span class="mbti-section-icon">💪</span>
                    강점
                </h3>
                <div id="strengthsList"></div>
            </div>
            
            <div class="mbti-result-section">
                <h3 class="mbti-section-title">
                    <span class="mbti-section-icon">🎯</span>
                    약점
                </h3>
                <div id="weaknessesList"></div>
            </div>
            
            <!-- 추가 정보 -->
            <div class="mbti-result-section">
                <h3 class="mbti-section-title">
                    <span class="mbti-section-icon">🌱</span>
                    성장 포인트
                </h3>
                <div id="growthPoints"></div>
            </div>
            
            <!-- 공유하기 -->
            <div class="mbti-share-section">
                <h3 class="mbti-share-title">결과 공유하기</h3>
                <div class="mbti-share-buttons">
                    <button class="mbti-share-button mbti-kakao-share" id="kakaoShare">
                        <span>💬</span> 카카오톡
                    </button>
                    <button class="mbti-share-button mbti-link-copy" onclick="copyLink()">
                        <span>🔗</span> 링크 복사
                    </button>
                </div>
            </div>
            
            <div class="mbti-navigation">
                <a href="/tests/mbti/" class="mbti-btn mbti-btn-secondary">테스트 소개 보기</a>
                <a href="/tests/mbti/test.html" class="mbti-btn mbti-btn-primary mbti-retry-button">다시 검사하기</a>
            </div>
        </div>
    </div>
    
    <div id="footer-placeholder"></div>
    
    <!-- External JavaScript -->
    <script src="/js/main.js"></script>
    <script src="/js/utils/kakao-share.js"></script>
    <script src="/js/pages/mbti-test.js"></script>
</body>
</html>
