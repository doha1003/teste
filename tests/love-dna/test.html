                    { text: "상대방이 정해주길 바란다", value: 'A' },

                    { text: "즉흥적으로 만난다", value: 'E' }
                ]
            }
        ];

        // 러브 DNA 유형 정의
        const loveDNATypes = {
            'TWFGF': {
                type: '열정적인 로맨티스트',
                nickname: '사랑에 올인하는 불꽃',
                rarity: '2.8%',
                description: '당신은 사랑에 있어서 매우 열정적이고 직접적인 표현을 선호합니다.',
                loveStyle: '스킨십과 달콤한 말로 사랑을 표현하고, 외적인 매력을 중요시하며, 에너지를 아낌없이 쏟아붓는 타입입니다. 갈등 상황에서는 직접적으로 맞서며 해결하려고 합니다.',
                idealDate: '로맨틱한 저녁 식사, 불꽃놀이 관람, 서프라이즈 이벤트',
                strengths: ['열정적인 사랑 표현', '적극적인 리더십', '즉각적인 문제 해결', '로맨틱한 분위기 연출'],
                weaknesses: ['때로는 너무 강한 감정 표현', '상대방의 속도를 고려하지 않음', '충동적인 결정'],
                compatibility: {
                    best: ['QMHEA', 'ACSMM'],
                    good: ['GWBTN', 'TFSGE'],
                    challenging: ['AFSSA', 'QPMEN']
                },
                celebrities: ['라이언 고슬링', '레이첼 맥아담스', '브래드 피트'],
                growth: '상대방의 페이스를 존중하고, 때로는 한 발 물러서서 관찰하는 여유를 가져보세요.'
            },
            // 더 많은 유형들 추가...
            'default': {
                type: '독특한 사랑꾼',
                nickname: '아직 발견되지 않은 유형',
                rarity: '0.1%',
                description: '당신은 매우 독특하고 희귀한 연애 스타일을 가지고 있습니다.',
                loveStyle: '기존의 틀에 얽매이지 않는 자유로운 연애 스타일을 추구합니다.',
                idealDate: '예측할 수 없는 모험, 새로운 경험',
                strengths: ['독창성', '예측불가능한 매력', '자유로운 사고'],
                weaknesses: ['일관성 부족', '예측하기 어려움'],
                compatibility: {
                    best: ['모든 유형과 가능'],
                    good: ['상황에 따라 다름'],
                    challenging: ['특별히 없음']
                },
                celebrities: ['당신이 최초입니다!'],
                growth: '자신만의 독특한 스타일을 유지하되, 상대방과의 소통을 늘려보세요.'
            }
        };

        // 전역 변수
        let currentQuestion = 0;
        let answers = {};
        let currentDNA = '';

        // 테스트 시작
        function startTest() {
            document.getElementById('intro-screen').classList.add('love-hidden');
            document.getElementById('test-screen').classList.remove('love-hidden');
            showQuestion();
        }

        // 질문 표시
        function showQuestion() {
            const question = questions[currentQuestion];
            
            document.getElementById('progress-text').textContent = `질문 ${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('progress-percent').textContent = `${Math.round((currentQuestion + 1) / questions.length * 100)}%`;
            document.getElementById('progress').style.width = `${(currentQuestion + 1) / questions.length * 100}%`;
            
            document.getElementById('question').textContent = question.text;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'love-option';
                optionDiv.textContent = option.text;
                optionDiv.onclick = () => selectOption(index);
                
                if (answers[currentQuestion] === index) {
                    optionDiv.classList.add('selected');
                }
                
                optionsContainer.appendChild(optionDiv);
            });
            
            // 네비게이션 버튼 상태 업데이트
            document.getElementById('prev-btn').style.display = currentQuestion > 0 ? 'block' : 'none';
            document.getElementById('next-btn').disabled = answers[currentQuestion] === undefined;
            
            if (currentQuestion === questions.length - 1) {
                document.getElementById('next-btn').textContent = '결과 보기';
            } else {
                document.getElementById('next-btn').textContent = '다음';
            }
        }

        // 옵션 선택
        function selectOption(index) {
            answers[currentQuestion] = index;
            
            // 선택된 옵션 표시
            const options = document.querySelectorAll('.love-option');
            options.forEach((option, i) => {
                if (i === index) {
                    option.classList.add('selected');
                } else {
                    option.classList.remove('selected');
                }
            });
            
            document.getElementById('next-btn').disabled = false;
        }

        // 이전 질문
        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        // 다음 질문
        function nextQuestion() {
            if (answers[currentQuestion] === undefined) return;
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                calculateResult();
            }
        }

        // 결과 계산
        function calculateResult() {
            let dna = '';
            let axisValues = { L: '', O: '', V: '', E: '', D: '' };
            
            questions.forEach((question, index) => {
                if (answers[index] !== undefined) {
                    const selectedOption = question.options[answers[index]];
                    axisValues[question.axis] = selectedOption.value;
                }
            });
            
            currentDNA = axisValues.L + axisValues.O + axisValues.V + axisValues.E + axisValues.D;
            showResult();
        }

        // 결과 표시
        function showResult() {
            document.getElementById('test-screen').classList.add('love-hidden');
            document.getElementById('result-screen').classList.remove('love-hidden');
            
            const result = loveDNATypes[currentDNA] || loveDNATypes['default'];
            
            // 기본 정보 표시
            document.getElementById('result-dna').textContent = currentDNA;
            document.getElementById('result-type').textContent = result.type;
            document.getElementById('result-nickname').textContent = result.nickname;
            document.getElementById('result-rarity').textContent = `전체의 ${result.rarity}`;
            
            // DNA 분석 표시
            const dnaBreakdown = document.getElementById('result-dna-breakdown');
            const dnaLabels = {
                L: { label: 'Love Expression', value: currentDNA[0] },
                O: { label: 'Openness', value: currentDNA[1] },
                V: { label: 'Value Priority', value: currentDNA[2] },
                E: { label: 'Energy', value: currentDNA[3] },
                D: { label: 'Decision Making', value: currentDNA[4] }
            };
            
            dnaBreakdown.innerHTML = Object.entries(dnaLabels).map(([key, data]) => `
                <div class="dna-item">
                    <span class="dna-label">${key} - ${data.label}</span>
                    <span class="dna-value">${data.value}</span>
                </div>
            `).join('');
            
            // 상세 정보 표시
            document.getElementById('love-style-content').innerHTML = `<p>${result.loveStyle}</p>`;
            document.getElementById('strengths-content').innerHTML = `<ul class="detail-list">${result.strengths.map(s => `<li>${s}</li>`).join('')}</ul>`;
            document.getElementById('weaknesses-content').innerHTML = `<ul class="detail-list">${result.weaknesses.map(w => `<li>${w}</li>`).join('')}</ul>`;
            document.getElementById('compatibility-content').innerHTML = `
                <p><strong>최고의 궁합:</strong> ${result.compatibility.best.join(', ')}</p>
                <p><strong>좋은 궁합:</strong> ${result.compatibility.good.join(', ')}</p>
                <p><strong>도전적인 관계:</strong> ${result.compatibility.challenging.join(', ')}</p>
            `;
            document.getElementById('ideal-date-content').innerHTML = `<p>${result.idealDate}</p>`;
            document.getElementById('growth-content').innerHTML = `<p>${result.growth}</p>`;
            
            // 유명인 표시
            const celebritiesGrid = document.getElementById('celebrities-grid');
            celebritiesGrid.innerHTML = result.celebrities.map(celeb => 
                `<div class="celebrity-chip">${celeb}</div>`
            ).join('');
            
            // 스크롤 상단으로
            window.scrollTo(0, 0);
        }

        // 다시 테스트
        function restartTest() {
            currentQuestion = 0;
            answers = {};
            currentDNA = '';
            
            document.getElementById('result-screen').classList.add('love-hidden');
            document.getElementById('intro-screen').classList.remove('love-hidden');
        }

        // 카카오톡 공유
        function shareKakao() {
            const result = loveDNATypes[currentDNA] || loveDNATypes['default'];
            
            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: `💕 나의 러브 DNA는 ${currentDNA}!`,
                    description: `${result.type} - ${result.nickname}\n당신도 러브 DNA 테스트를 해보세요!`,
                    imageUrl: 'https://doha.kr/images/love-dna-share.jpg',
                    link: {
                        mobileWebUrl: 'https://doha.kr/tests/love-dna/',
                        webUrl: 'https://doha.kr/tests/love-dna/'
                    }
                },
                buttons: [
                    {
                        title: '테스트 하러가기',
                        link: {
                            mobileWebUrl: 'https://doha.kr/tests/love-dna/',
                            webUrl: 'https://doha.kr/tests/love-dna/'
                        }
                    }
                ]
            });
        }

        // 링크 복사
        function copyLink() {
            const url = 'https://doha.kr/tests/love-dna/';
            navigator.clipboard.writeText(url).then(() => {
                alert('링크가 복사되었습니다!');
            });
        }
    </script>
