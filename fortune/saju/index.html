<body class="fortune-page">
    <!-- 네비게이션 바 -->
    <div id="navbar-placeholder"></div>
    
    <!-- 페이지 헤더 -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title fade-in">🎴 AI 사주팔자</h1>
            <p class="page-subtitle fade-in stagger-1">
                만세력 기반 정확한 사주팔자 분석<br>
                AI가 당신의 타고난 운명과 성격을 상세하게 해석합니다
            </p>
        </div>
    </section>
    
    <!-- 사주 입력 폼 -->
    <section class="saju-section">
        <div class="container">
            <div class="saju-form-container" id="sajuForm">
                <h2>사주팔자 정보 입력</h2>
                <form onsubmit="generateSaju(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="userName">이름</label>
                            <input type="text" id="userName" name="userName" class="form-control" placeholder="홍길동" required>
                        </div>
                        <div class="form-group">
                            <label for="gender">성별</label>
                            <select id="gender" name="gender" class="form-control" required>
                                <option value="">선택해주세요</option>
                                <option value="male">남성</option>
                                <option value="female">여성</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="birthYear">생년</label>
                            <select id="birthYear" name="birthYear" class="form-control" required>
                                <option value="">연도 선택</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="birthMonth">생월</label>
                            <select id="birthMonth" name="birthMonth" class="form-control" required>
                                <option value="">월 선택</option>
                                <option value="1">1월</option>
                                <option value="2">2월</option>
                                <option value="3">3월</option>
                                <option value="4">4월</option>
                                <option value="5">5월</option>
                                <option value="6">6월</option>
                                <option value="7">7월</option>
                                <option value="8">8월</option>
                                <option value="9">9월</option>
                                <option value="10">10월</option>
                                <option value="11">11월</option>
                                <option value="12">12월</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="birthDay">생일</label>
                            <select id="birthDay" name="birthDay" class="form-control" required>
                                <option value="">일 선택</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="birthTime">출생시간</label>
                        <select id="birthTime" name="birthTime" class="form-control">
                            <option value="-1">모름</option>
                            <option value="0">자시 (23:00-01:00)</option>
                            <option value="2">축시 (01:00-03:00)</option>
                            <option value="4">인시 (03:00-05:00)</option>
                            <option value="6">묘시 (05:00-07:00)</option>
                            <option value="8">진시 (07:00-09:00)</option>
                            <option value="10">사시 (09:00-11:00)</option>
                            <option value="12">오시 (11:00-13:00)</option>
                            <option value="14">미시 (13:00-15:00)</option>
                            <option value="16">신시 (15:00-17:00)</option>
                            <option value="18">유시 (17:00-19:00)</option>
                            <option value="20">술시 (19:00-21:00)</option>
                            <option value="22">해시 (21:00-23:00)</option>
                        </select>
                    </div>
                    
                    <div class="form-check">
                        <input type="checkbox" id="isLunar" name="isLunar">
                        <label for="isLunar">음력 생일입니다</label>
                    </div>
                    
                    <button type="submit" class="btn-submit">사주팔자 분석하기</button>
                </form>
            </div>
            
            <!-- 사주 결과 -->
            <div id="sajuResult">
                <!-- 결과가 여기에 표시됩니다 -->
            </div>
        </div>
    </section>
    
    <!-- 광고 영역 -->
    <div class="ad-container">
        <div class="ad-label">광고</div>
        <ins class="adsbygoogle"
             data-ad-client="ca-pub-7905640648499222"
             data-ad-slot="1234567890"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
    </div>
    
    <!-- 푸터 -->
    <div id="footer-placeholder"></div>
    
    <!-- JavaScript -->
    <script src="/js/bundle.min.js" defer></script>
    <script src="/js/main.min.js"></script>
    <script src="/js/gemini-api.min.js"></script>
    
    <script>
        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', function() {
            // 연도 옵션 추가
            const yearSelect = document.getElementById('birthYear');
            const currentYear = new Date().getFullYear();
            for (let year = currentYear; year >= 1900; year--) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year + '년';
                yearSelect.appendChild(option);
            }
            
            // 월 선택 시 일 옵션 업데이트
            document.getElementById('birthMonth').addEventListener('change', updateDayOptions);
            document.getElementById('birthYear').addEventListener('change', updateDayOptions);
        });
        
        // 일 옵션 업데이트
        function updateDayOptions() {
            const year = parseInt(document.getElementById('birthYear').value);
            const month = parseInt(document.getElementById('birthMonth').value);
            const daySelect = document.getElementById('birthDay');
            
            daySelect.innerHTML = '<option value="">일 선택</option>';
            
            if (year && month) {
                const daysInMonth = new Date(year, month, 0).getDate();
                for (let day = 1; day <= daysInMonth; day++) {
                    const option = document.createElement('option');
                    option.value = day;
                    option.textContent = day + '일';
                    daySelect.appendChild(option);
                }
            }
        }
        
        // 애드센스 광고 로드
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
