<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 일일 운세 - AI 운세 | doha.kr</title>
    <meta name="description" content="AI가 분석하는 개인 맞춤형 일일 운세. 생년월일을 입력하면 상세한 오늘의 운세를 확인할 수 있습니다.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="AI 일일 운세 | doha.kr">
    <meta property="og:description" content="AI가 분석하는 개인 맞춤형 일일 운세. 생년월일을 입력하면 상세한 오늘의 운세를 확인할 수 있습니다.">
    <meta property="og:image" content="https://doha.kr/images/og-default.png">
    <meta property="og:url" content="https://doha.kr/fortune/daily/">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/fortune.css">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7905640648499222" crossorigin="anonymous"></script>
</head>
<body>
    <!-- 네비게이션 바 -->
    <div id="navbar-placeholder"></div>
    
    <!-- 페이지 헤더 -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title fade-in">AI 일일 운세</h1>
            <p class="page-subtitle fade-in stagger-1">
                AI가 분석하는 오늘의 상세한 운세
            </p>
        </div>
    </section>
    
    <!-- 운세 입력 폼 -->
    <section class="fortune-section">
        <div class="container">
            <div class="fortune-form-container" id="fortuneForm">
                <h2>당신의 정보를 입력해주세요</h2>
                <form onsubmit="generateFortune(event)">
                    <div class="form-group">
                        <label for="userName">이름</label>
                        <input type="text" id="userName" name="userName" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="birthDate">생년월일</label>
                        <input type="date" id="birthDate" name="birthDate" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="gender">성별</label>
                        <select id="gender" name="gender" class="form-control" required>
                            <option value="">선택해주세요</option>
                            <option value="male">남성</option>
                            <option value="female">여성</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="birthTime">출생시간 (선택사항)</label>
                        <input type="time" id="birthTime" name="birthTime" class="form-control">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
                        🔮 오늘의 운세 보기
                    </button>
                </form>
            </div>
            
            <!-- 운세 결과 영역 -->
            <div id="fortuneResult" style="display: none;">
                <!-- 결과가 여기에 표시됩니다 -->
            </div>
        </div>
    </section>
    
    <!-- 광고 영역 -->
    <div class="ad-container">
        <div class="ad-label">광고</div>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7905640648499222"
             data-ad-slot="1234567890"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
    </div>
    
    <!-- 일일 운세 안내 -->
    <section class="info-section">
        <div class="container">
            <div class="info-box">
                <h3>AI 일일 운세 안내</h3>
                <ul>
                    <li>생년월일과 개인 정보를 바탕으로 AI가 오늘의 운세를 분석합니다.</li>
                    <li>총운, 애정운, 금전운, 건강운을 상세하게 확인할 수 있습니다.</li>
                    <li>운세는 참고 사항이며, 절대적인 예언이 아닙니다.</li>
                    <li>긍정적인 마음가짐이 좋은 운을 만듭니다.</li>
                </ul>
            </div>
        </div>
    </section>
    
    <!-- 푸터 -->
    <div id="footer-placeholder"></div>
    
    <!-- External JavaScript -->
    <script src="/js/main.js"></script>
    
    <script>
        // 오늘의 운세 생성 함수
        function generateFortune(event) {
            event.preventDefault();
            
            const userName = document.getElementById('userName').value;
            const birthDate = document.getElementById('birthDate').value;
            const gender = document.getElementById('gender').value;
            const birthTime = document.getElementById('birthTime').value;
            
            // 로딩 표시
            const resultDiv = document.getElementById('fortuneResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div class="loading" style="text-align: center; padding: 40px;">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 20px;">AI가 ${userName}님의 운세를 분석하고 있습니다...</p>
                </div>
            `;
            
            // 폼 숨기기
            document.getElementById('fortuneForm').style.display = 'none';
            
            // 운세 생성 시뮬레이션 (실제로는 API 호출)
            setTimeout(() => {
                displayFortune(userName, birthDate, gender, birthTime);
            }, 2000);
        }
        
        // 운세 표시 함수
        function displayFortune(userName, birthDate, gender, birthTime) {
            const today = new Date();
            const birthDateObj = new Date(birthDate);
            const age = today.getFullYear() - birthDateObj.getFullYear();
            
            // 운세 점수 생성 (60-95 사이의 랜덤값)
            const totalScore = Math.floor(Math.random() * 35) + 60;
            const loveScore = Math.floor(Math.random() * 35) + 60;
            const moneyScore = Math.floor(Math.random() * 35) + 60;
            const healthScore = Math.floor(Math.random() * 35) + 60;
            
            // 운세 메시지 생성
            const fortuneMessages = {
                total: [
                    "오늘은 전반적으로 순조로운 하루가 될 것입니다. 평소보다 적극적인 자세로 임하면 좋은 결과를 얻을 수 있습니다.",
                    "새로운 기회가 찾아올 수 있는 날입니다. 주변을 잘 살펴보고 기회를 놓치지 마세요.",
                    "약간의 어려움이 있을 수 있지만, 긍정적인 마음으로 극복할 수 있습니다.",
                    "평온한 하루가 예상됩니다. 일상의 소소한 행복을 즐기기 좋은 날입니다."
                ],
                love: [
                    "연인과의 관계가 더욱 돈독해질 수 있는 날입니다. 솔직한 대화를 나누어보세요.",
                    "새로운 만남의 기회가 있을 수 있습니다. 마음을 열고 다가가보세요.",
                    "사소한 오해가 생길 수 있으니 상대방의 입장을 이해하려 노력하세요.",
                    "혼자만의 시간을 가지며 자신을 돌아보는 것도 좋습니다."
                ],
                money: [
                    "재정 상태가 안정적입니다. 계획적인 소비를 유지하세요.",
                    "예상치 못한 수입이 생길 수 있습니다. 하지만 과도한 지출은 피하세요.",
                    "투자나 큰 지출은 신중하게 결정하세요. 충동적인 결정은 피하는 것이 좋습니다.",
                    "절약하는 습관을 기르기 좋은 시기입니다. 작은 것부터 시작해보세요."
                ],
                health: [
                    "건강 상태가 양호합니다. 규칙적인 운동을 시작하기 좋은 때입니다.",
                    "충분한 휴식이 필요합니다. 무리하지 말고 적절한 휴식을 취하세요.",
                    "스트레스 관리에 신경 쓰세요. 명상이나 요가가 도움이 될 수 있습니다.",
                    "식습관 개선이 필요합니다. 균형 잡힌 식사를 하도록 노력하세요."
                ]
            };
            
            // 랜덤 메시지 선택
            const totalMsg = fortuneMessages.total[Math.floor(Math.random() * fortuneMessages.total.length)];
            const loveMsg = fortuneMessages.love[Math.floor(Math.random() * fortuneMessages.love.length)];
            const moneyMsg = fortuneMessages.money[Math.floor(Math.random() * fortuneMessages.money.length)];
            const healthMsg = fortuneMessages.health[Math.floor(Math.random() * fortuneMessages.health.length)];
            
            // 행운의 숫자, 색상, 시간 생성
            const luckyNumber = Math.floor(Math.random() * 9) + 1;
            const luckyColors = ['빨강', '파랑', '노랑', '초록', '보라', '주황', '분홍', '하늘색'];
            const luckyColor = luckyColors[Math.floor(Math.random() * luckyColors.length)];
            const luckyTime = `${Math.floor(Math.random() * 12) + 1}시`;
            
            const resultDiv = document.getElementById('fortuneResult');
            resultDiv.innerHTML = `
                <div class="fortune-result-container">
                    <h2 style="text-align: center; margin-bottom: 30px;">
                        ${userName}님의 ${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일 운세
                    </h2>
                    
                    <div class="fortune-score-grid">
                        <div class="fortune-score-item">
                            <h4>🌟 총운</h4>
                            <div class="score-circle" data-score="${totalScore}">
                                <svg width="120" height="120">
                                    <circle cx="60" cy="60" r="50" stroke="#e5e7eb" stroke-width="10" fill="none"/>
                                    <circle cx="60" cy="60" r="50" stroke="#8b5cf6" stroke-width="10" fill="none"
                                            stroke-dasharray="${3.14 * 100}" stroke-dashoffset="${3.14 * 100 * (1 - totalScore/100)}"
                                            transform="rotate(-90 60 60)"/>
                                </svg>
                                <div class="score-text">${totalScore}점</div>
                            </div>
                            <p>${totalMsg}</p>
                        </div>
                        
                        <div class="fortune-score-item">
                            <h4>💕 애정운</h4>
                            <div class="score-circle" data-score="${loveScore}">
                                <svg width="120" height="120">
                                    <circle cx="60" cy="60" r="50" stroke="#e5e7eb" stroke-width="10" fill="none"/>
                                    <circle cx="60" cy="60" r="50" stroke="#ec4899" stroke-width="10" fill="none"
                                            stroke-dasharray="${3.14 * 100}" stroke-dashoffset="${3.14 * 100 * (1 - loveScore/100)}"
                                            transform="rotate(-90 60 60)"/>
                                </svg>
                                <div class="score-text">${loveScore}점</div>
                            </div>
                            <p>${loveMsg}</p>
                        </div>
                        
                        <div class="fortune-score-item">
                            <h4>💰 금전운</h4>
                            <div class="score-circle" data-score="${moneyScore}">
                                <svg width="120" height="120">
                                    <circle cx="60" cy="60" r="50" stroke="#e5e7eb" stroke-width="10" fill="none"/>
                                    <circle cx="60" cy="60" r="50" stroke="#f59e0b" stroke-width="10" fill="none"
                                            stroke-dasharray="${3.14 * 100}" stroke-dashoffset="${3.14 * 100 * (1 - moneyScore/100)}"
                                            transform="rotate(-90 60 60)"/>
                                </svg>
                                <div class="score-text">${moneyScore}점</div>
                            </div>
                            <p>${moneyMsg}</p>
                        </div>
                        
                        <div class="fortune-score-item">
                            <h4>🏃 건강운</h4>
                            <div class="score-circle" data-score="${healthScore}">
                                <svg width="120" height="120">
                                    <circle cx="60" cy="60" r="50" stroke="#e5e7eb" stroke-width="10" fill="none"/>
                                    <circle cx="60" cy="60" r="50" stroke="#10b981" stroke-width="10" fill="none"
                                            stroke-dasharray="${3.14 * 100}" stroke-dashoffset="${3.14 * 100 * (1 - healthScore/100)}"
                                            transform="rotate(-90 60 60)"/>
                                </svg>
                                <div class="score-text">${healthScore}점</div>
                            </div>
                            <p>${healthMsg}</p>
                        </div>
                    </div>
                    
                    <div class="fortune-lucky-info">
                        <h3>🍀 오늘의 행운 정보</h3>
                        <div class="lucky-grid">
                            <div class="lucky-item">
                                <strong>행운의 숫자</strong>
                                <span>${luckyNumber}</span>
                            </div>
                            <div class="lucky-item">
                                <strong>행운의 색상</strong>
                                <span>${luckyColor}</span>
                            </div>
                            <div class="lucky-item">
                                <strong>행운의 시간</strong>
                                <span>${luckyTime}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div style="text-align: center; margin-top: 40px;">
                        <button onclick="location.reload()" class="btn btn-secondary">
                            다시 보기
                        </button>
                    </div>
                </div>
            `;
            
            // 점수 애니메이션
            animateScores();
        }
        
        // 점수 애니메이션 함수
        function animateScores() {
            const circles = document.querySelectorAll('.score-circle circle:nth-child(2)');
            circles.forEach(circle => {
                circle.style.transition = 'stroke-dashoffset 1s ease-out';
            });
        }
    </script>
    
    <style>
        .fortune-form-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .fortune-form-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--gray-900);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gray-700);
        }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        
        .fortune-result-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .fortune-score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .fortune-score-item {
            text-align: center;
            padding: 20px;
            background: var(--gray-50);
            border-radius: 12px;
        }
        
        .fortune-score-item h4 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--gray-800);
        }
        
        .score-circle {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-800);
        }
        
        .fortune-score-item p {
            color: var(--gray-600);
            line-height: 1.6;
        }
        
        .fortune-lucky-info {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            padding: 30px;
            border-radius: 12px;
            color: white;
            text-align: center;
        }
        
        .fortune-lucky-info h3 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .lucky-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .lucky-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 8px;
        }
        
        .lucky-item strong {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            opacity: 0.9;
        }
        
        .lucky-item span {
            font-size: 20px;
            font-weight: 700;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--gray-200);
            border-top: 3px solid var(--primary-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .fortune-score-grid {
                grid-template-columns: 1fr;
            }
            
            .lucky-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    
    <!-- AdSense initialization -->
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
