<body>
    <!-- 네비게이션 바 -->
    <div id="navbar-placeholder"></div>
    
    <!-- 간결한 페이지 헤더 -->
    <div class="compact-hero">
        <h1>🌅 오늘의 운세</h1>
        <p>사주팔자와 천체 배치를 종합한 전문 운세 분석</p>
    </div>
    
    <!-- 운세 입력 폼 -->
    <div class="fortune-container">
        <form id="dailyFortuneForm" class="fortune-form fade-in">
            <h2>✨ 운세 정보 입력 ✨</h2>
            
            <div class="form-group">
                <label for="userName">👤 이름</label>
                <input type="text" id="userName" name="userName" class="form-control" required placeholder="이름을 입력하세요">
            </div>
            
            <div class="form-group">
                <label for="birthDate">📅 생년월일</label>
                <input type="date" id="birthDate" name="birthDate" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>⚥ 성별</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="male" required>
                        <span>👨 남성</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="female" required>
                        <span>👩 여성</span>
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="birthTime">🕐 출생 시간 (선택사항)</label>
                <input type="time" id="birthTime" name="birthTime" class="form-control">
                <div class="form-helper-text">
                    출생 시간을 입력하면 더 정확한 운세를 볼 수 있습니다
                </div>
            </div>
            
            <button type="submit" class="submit-btn">
                🔮 운세 보기
            </button>
        </form>
        
        <!-- 운세 결과 영역 -->
        <div id="fortuneResult" class="fortune-result" style="display: none;">
            <!-- 결과가 여기에 표시됩니다 -->
        </div>

    <!-- 광고 영역 -->
    <div class="ad-container">
        <div class="ad-label">광고</div>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7905640648499222"
             data-ad-slot="1234567890"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
    </div>
    
    <!-- 안내 섹션 -->
    <section class="service-highlights">
        <div class="container">
            <div class="highlight-card">
                <h3>🔮 AI 운세 안내</h3>
                <ul>
                    <li>✨ 사주팔자와 현대 점성술을 결합한 전문 분석입니다.</li>
                    <li>🔒 입력하신 개인정보는 운세 분석에만 사용되며, 저장되지 않습니다.</li>
                    <li>🌙 매일 자정에 천체 배치가 업데이트됩니다.</li>
                    <li>⏰ 출생 시간을 입력하면 시주까지 고려한 정밀 분석이 가능합니다.</li>
                </ul>
            </div>
        </div>
    </section>
    
    <!-- 푸터 -->
    <div id="footer-placeholder"></div>
    
    <!-- External JavaScript -->
    <script src="/js/main.js"></script>
    <script src="/js/gemini-api.js"></script>
    <script>
        document.getElementById('dailyFortuneForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const userData = {
                name: formData.get('userName'),
                birthDate: formData.get('birthDate'),
                gender: formData.get('gender'),
                birthTime: formData.get('birthTime') || null
            };
            
            const resultDiv = document.getElementById('fortuneResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">🔮 AI가 사주팔자를 분석 중입니다...</div>
                    <p style="color: #6b7280; margin-top: 12px;">천간지지와 오행의 상생상극을 계산하고 있습니다</p>
                    
                    <div class="loading-tips">
                        <h4>💫 전문 분석 과정</h4>
                        <ul>
                            <li>생년월일시 사주팔자 배열</li>
                            <li>대운(大運)과 세운(歲運) 확인</li>
                            <li>12운성과 신살 분석</li>
                            <li>오행의 균형과 용신 판단</li>
                        </ul>
                    </div>
                </div>
            `;
            
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // AI 운세 생성
            const fortuneData = await generateDailyFortuneWithAI(
                userData.name, 
                userData.birthDate, 
                userData.gender, 
                userData.birthTime
            );
            
            displayAIFortune(fortuneData);
        });
        
        function displayAIFortune(data) {
            const resultDiv = document.getElementById('fortuneResult');
            const today = new Date().toLocaleDateString('ko-KR', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            });
            
            const aiIndicator = data.aiGenerated ? 
                '<span style="color: #10b981; font-size: 14px;">🤖 AI 분석</span>' : 
                '<span style="color: #f59e0b; font-size: 14px;">📚 백업 데이터</span>';
            
            resultDiv.innerHTML = `
                <div class="fortune-header">
                    <div class="fortune-date">${today} - ${data.ganzhi}일 ${aiIndicator}</div>
                    <div class="fortune-name">🌟 ${data.name}님의 사주 운세 🌟</div>
                </div>
