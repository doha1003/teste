<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 운세 - AI 운세 | doha.kr</title>
    <meta name="description" content="AI가 분석하는 오늘의 운세. 총운, 애정운, 금전운, 건강운을 상세히 알려드립니다.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="오늘의 운세 - AI가 분석하는 개인 맞춤 운세">
    <meta property="og:description" content="생년월일 기반 AI 분석으로 정확한 오늘의 운세를 확인하세요">
    <meta property="og:image" content="https://doha.kr/images/daily-fortune-og.png">
    <meta property="og:url" content="https://doha.kr/fortune/daily/">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    
    <!-- Favicon -->
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7905640648499222" crossorigin="anonymous"></script>
</head>
<body>
    <!-- 네비게이션 바 -->
    <div id="navbar-placeholder"></div>
    
    <!-- 페이지 헤더 -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title fade-in">
                🌅 오늘의 운세
            </h1>
            <p class="hero-subtitle fade-in stagger-1">
                AI가 분석하는 정확한 일일 운세<br>
                개인정보 기반 맞춤형 분석
            </p>
        </div>
    </section>
    
    <!-- 운세 입력 폼 -->
    <section class="features">
        <div class="container">
            <form id="dailyFortuneForm" class="fortune-form fade-in">
                <h2 style="text-align: center; margin-bottom: 32px;">운세 정보 입력</h2>
                
                <div class="form-group">
                    <label for="userName">이름</label>
                    <input type="text" id="userName" name="userName" class="form-control" required placeholder="이름을 입력하세요">
                </div>
                
                <div class="form-group">
                    <label for="birthDate">생년월일</label>
                    <input type="date" id="birthDate" name="birthDate" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label>성별</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="gender" value="male" required>
                            남성
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="gender" value="female" required>
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="birthTime">출생 시간 (선택사항)</label>
                    <input type="time" id="birthTime" name="birthTime" class="form-control">
                    <small style="color: var(--gray-600); margin-top: 4px; display: block;">
                        출생 시간을 입력하면 더 정확한 운세를 볼 수 있습니다
                    </small>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px;">
                    운세 보기
                </button>
            </form>
            
            <!-- 운세 결과 영역 -->
            <div id="fortuneResult" class="fortune-result" style="display: none;">
                <!-- 결과가 여기에 표시됩니다 -->
            </div>
        </div>
    </section>
    
    <!-- 광고 영역 -->
    <div class="ad-container">
        <div class="ad-label">광고</div>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7905640648499222"
             data-ad-slot="1234567890"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
    </div>
    
    <!-- 안내 섹션 -->
    <section class="service-highlights">
        <div class="container">
            <div class="highlight-card">
                <h3>AI 운세 안내</h3>
                <ul>
                    <li>AI가 분석한 운세는 참고용이며, 절대적인 예측이 아닙니다.</li>
                    <li>입력하신 개인정보는 운세 분석에만 사용되며, 저장되지 않습니다.</li>
                    <li>매일 자정에 운세가 업데이트됩니다.</li>
                    <li>더 정확한 운세를 원하시면 출생 시간을 함께 입력해주세요.</li>
                </ul>
            </div>
        </div>
    </section>
    
    <!-- 푸터 -->
    <div id="footer-placeholder"></div>
    
    <!-- External JavaScript -->
    <script src="/js/main.js"></script>
    <script>
        // 일일 운세 처리 스크립트
        document.getElementById('dailyFortuneForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 폼 데이터 수집
            const formData = new FormData(e.target);
            const userData = {
                name: formData.get('userName'),
                birthDate: formData.get('birthDate'),
                gender: formData.get('gender'),
                birthTime: formData.get('birthTime') || null
            };
            
            // 결과 영역 표시
            const resultDiv = document.getElementById('fortuneResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <div style="font-size: 3em; margin-bottom: 20px;">🔮</div>
                    <p style="margin-top: 20px;">AI가 운세를 분석 중입니다...</p>
                </div>
            `;
            
            // 결과로 스크롤
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // 모의 운세 생성 (실제로는 AI API 호출)
            setTimeout(() => {
                displayFortuneResult(userData);
            }, 2500);
        });
        
        function displayFortuneResult(userData) {
            const resultDiv = document.getElementById('fortuneResult');
            const today = new Date().toLocaleDateString('ko-KR', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            // 모의 운세 데이터
            const fortuneData = {
                overallScore: 85,
                overall: "오늘은 새로운 기회가 찾아오는 날입니다. 긍정적인 마음가짐으로 하루를 시작하세요.",
                loveScore: 80,
                moneyScore: 75,
                healthScore: 90,
                advice: "작은 변화가 큰 행운을 가져다줄 것입니다.",
                luckyNumber: "7, 21",
                luckyColor: "파란색"
            };
            
            resultDiv.innerHTML = `
                <div class="fortune-header">
                    <div class="fortune-date">${today}</div>
                    <div class="fortune-name">${userData.name}님의 운세</div>
                </div>
                
                <div class="fortune-categories">
                    <div class="fortune-category">
                        <div class="category-title">
                            <span>🌟</span> 총운
                        </div>
                        <div class="category-score">${fortuneData.overallScore}/100</div>
                        <div class="category-description">
                            ${fortuneData.overall}
                        </div>
                    </div>
                    
                    <div class="fortune-category">
                        <div class="category-title">
                            <span>💕</span> 애정운
                        </div>
                        <div class="category-score">${fortuneData.loveScore}/100</div>
                        <div class="category-description">
                            사랑운이 좋습니다.
                        </div>
                    </div>
                    
                    <div class="fortune-category">
                        <div class="category-title">
                            <span>💰</span> 금전운
                        </div>
                        <div class="category-score">${fortuneData.moneyScore}/100</div>
                        <div class="category-description">
                            재정관리에 신경쓰세요.
                        </div>
                    </div>
                    
                    <div class="fortune-category">
                        <div class="category-title">
                            <span>💪</span> 건강운
                        </div>
                        <div class="category-score">${fortuneData.healthScore}/100</div>
                        <div class="category-description">
                            건강관리에 유의하세요.
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 40px; padding: 24px; background: var(--gray-50); border-radius: 12px;">
                    <h3 style="margin-bottom: 12px;">🔮 오늘의 조언</h3>
                    <p style="color: var(--gray-700); line-height: 1.7;">
                        ${fortuneData.advice}
                    </p>
                    
                    <div style="margin-top: 20px; display: flex; gap: 20px; font-size: 14px;">
                        <span><strong>행운의 숫자:</strong> ${fortuneData.luckyNumber}</span>
                        <span><strong>행운의 색상:</strong> ${fortuneData.luckyColor}</span>
                    </div>
                </div>
                
                <div style="margin-top: 24px; text-align: center;">
                    <button onclick="location.reload()" class="btn btn-secondary">
                        다시 보기
                    </button>
                </div>
            `;
        }
    </script>
    
    <!-- AdSense initialization -->
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
