<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 타로 리딩 - AI 운세 | doha.kr</title>
    <meta name="description" content="질문을 입력하면 AI가 타로 카드를 뽑아 심층적인 해석을 제공합니다.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="AI 타로 리딩 | doha.kr">
    <meta property="og:description" content="질문을 입력하면 AI가 타로 카드를 뽑아 심층적인 해석을 제공합니다.">
    <meta property="og:image" content="https://doha.kr/images/og-default.png">
    <meta property="og:url" content="https://doha.kr/fortune/tarot/">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/fortune.css">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7905640648499222" crossorigin="anonymous"></script>
</head>
<body>
    <!-- 네비게이션 바 -->
    <div id="navbar-placeholder"></div>
    
    <!-- 페이지 헤더 -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title fade-in">AI 타로 리딩</h1>
            <p class="page-subtitle fade-in stagger-1">
                AI가 해석하는 신비로운 타로 카드의 메시지
            </p>
        </div>
    </section>
    
    <!-- 타로 리딩 섹션 -->
    <section class="tarot-section">
        <div class="container">
            <form id="tarotForm" class="tarot-form fade-in">
                <h2 style="text-align: center; margin-bottom: 32px;">타로 리딩 시작하기</h2>
                
                <div class="form-group">
                    <label for="question">질문을 입력하세요</label>
                    <textarea 
                        id="question" 
                        name="question" 
                        class="form-control" 
                        rows="4" 
                        required 
                        placeholder="타로에게 묻고 싶은 질문을 구체적으로 적어주세요. 예: 현재 연애 관계가 어떻게 발전할까요?"
                    ></textarea>
                    <small style="color: var(--gray-600); margin-top: 4px; display: block;">
                        구체적인 질문일수록 더 명확한 답을 얻을 수 있습니다
                    </small>
                </div>
                
                <div class="form-group">
                    <label>스프레드 선택</label>
                    <div class="spread-options">
                        <label class="radio-card">
                            <input type="radio" name="spread" value="oneCard" required checked>
                            <div class="radio-card-content">
                                <span class="spread-icon">🎴</span>
                                <span class="spread-name">원 카드</span>
                                <span class="spread-desc">빠른 통찰</span>
                            </div>
                        </label>
                        
                        <label class="radio-card">
                            <input type="radio" name="spread" value="threeCard" required>
                            <div class="radio-card-content">
                                <span class="spread-icon">🎴🎴🎴</span>
                                <span class="spread-name">쓰리 카드</span>
                                <span class="spread-desc">과거-현재-미래</span>
                            </div>
                        </label>
                        
                        <label class="radio-card">
                            <input type="radio" name="spread" value="celtic" required>
                            <div class="radio-card-content">
                                <span class="spread-icon">🌟</span>
                                <span class="spread-name">켈틱 크로스</span>
                                <span class="spread-desc">심층 분석</span>
                            </div>
                        </label>
                    </div>
                </div>
                
                <div id="spreadDescription" class="spread-description" style="display: none;">
                    <!-- 스프레드 설명이 여기에 표시됩니다 -->
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px;">
                    🔮 타로 리딩 시작
                </button>
            </form>
            
            <!-- 타로 결과 영역 -->
            <div id="tarotResult" class="tarot-result" style="display: none;">
                <!-- 결과가 여기에 표시됩니다 -->
            </div>
        </div>
    </section>
    
    <!-- 타로 안내 섹션 -->
    <section class="info-section">
        <div class="container">
            <div class="info-box">
                <h3>AI 타로 리딩 안내</h3>
                <ul>
                    <li>타로 카드는 현재 상황에 대한 통찰과 가이드를 제공합니다.</li>
                    <li>질문은 구체적일수록 더 명확한 답변을 받을 수 있습니다.</li>
                    <li>카드의 해석은 참고용이며, 최종 결정은 본인이 내리셔야 합니다.</li>
                    <li>메이저 아르카나 22장을 사용하여 리딩을 진행합니다.</li>
                    <li>같은 질문도 시기에 따라 다른 카드가 나올 수 있습니다.</li>
                </ul>
            </div>
        </div>
    </section>
    
    <!-- 광고 영역 -->
    <div class="ad-container">
        <div class="ad-label">광고</div>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7905640648499222"
             data-ad-slot="1234567890"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
    </div>
    
    
    <!-- 푸터 -->
    <div id="footer-placeholder"></div>
    
    <!-- External JavaScript -->
    <script src="/js/main.js"></script>
    <script src="/js/tarot.js"></script>
    
    <!-- AdSense initialization -->
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
