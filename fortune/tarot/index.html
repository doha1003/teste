<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 타로 리딩 - 신비로운 타로 카드 해석 | doha.kr</title>
    <meta name="description" content="AI가 해석하는 신비로운 타로 리딩. 질문을 입력하고 카드를 선택하면 AI가 메시지를 전달합니다.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="AI 타로 리딩 - 신비로운 타로 카드 해석">
    <meta property="og:description" content="질문을 하고 카드를 선택하면 AI가 타로의 메시지를 해석해드립니다">
    <meta property="og:image" content="https://doha.kr/images/tarot-og.png">
    <meta property="og:url" content="https://doha.kr/fortune/tarot/">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    
    <!-- Favicon -->
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7905640648499222" crossorigin="anonymous"></script>
</head>
<body>
    <!-- 네비게이션 -->
    <div id="navbar-placeholder"></div>
    
    <div class="fortune-container">
        <div class="hero">
            <div class="hero-content">
                <h1 class="hero-title fade-in">🃏 AI 타로 리딩</h1>
                <p class="hero-subtitle fade-in stagger-1">AI가 해석하는 신비로운 타로 카드의 메시지</p>
            </div>
        </div>
        
        <div class="features">
            <div class="container">
                <!-- 질문 입력 단계 -->
                <div id="questionStep" class="tarot-step">
                    <h2 style="text-align: center; margin-bottom: 30px;">질문을 입력하세요</h2>
                    <form id="tarotQuestionForm" class="fortune-form">
                        <div class="form-group">
                            <label for="tarotQuestion">궁금한 것을 질문해주세요</label>
                            <textarea 
                                id="tarotQuestion" 
                                name="tarotQuestion" 
                                class="form-control" 
                                rows="4" 
                                required 
                                placeholder="예: 앞으로의 연애운은 어떨까요? 새로운 직장에서 잘 적응할 수 있을까요?"
                                style="resize: vertical;"
                            ></textarea>
                            <small style="color: var(--gray-600); margin-top: 8px; display: block;">
                                구체적이고 명확한 질문일수록 더 정확한 답변을 받을 수 있습니다
                            </small>
                        </div>
                        
                        <div class="form-group">
                            <label>타로 스프레드 선택</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="spreadType" value="single" required checked>
                                    원카드 리딩 (빠른 답변)
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="spreadType" value="three" required>
                                    쓰리카드 리딩 (과거-현재-미래)
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="spreadType" value="celtic" required>
                                    셀틱 크로스 (상세 분석)
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px;">
                            카드 선택하기
                        </button>
                    </form>
                </div>
                
                <!-- 카드 선택 단계 -->
                <div id="cardStep" class="tarot-step" style="display: none;">
                    <h2 style="text-align: center; margin-bottom: 30px;">카드를 선택하세요</h2>
                    <p style="text-align: center; margin-bottom: 40px; color: var(--gray-600);">
                        직감을 믿고 끌리는 카드를 선택해주세요
                    </p>
                    
                    <div id="cardGrid" class="card-grid">
                        <!-- 카드들이 여기에 동적으로 생성됩니다 -->
                    </div>
                    
                    <div style="text-align: center; margin-top: 30px;">
                        <button onclick="goBackToQuestion()" class="btn btn-secondary">
                            질문 다시 입력
                        </button>
                    </div>
                </div>
                
                <!-- 결과 단계 -->
                <div id="resultStep" class="tarot-step" style="display: none;">
                    <h2 style="text-align: center; margin-bottom: 30px;">타로 리딩 결과</h2>
                    
                    <div id="tarotResult">
                        <!-- 결과가 여기에 표시됩니다 -->
                    </div>
                    
                    <div style="text-align: center; margin-top: 30px;">
                        <button onclick="restartTarot()" class="btn btn-primary">
                            새로운 질문하기
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 광고 영역 -->
        <div class="ad-container">
            <div class="ad-label">광고</div>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7905640648499222"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>
    
    <!-- 푸터 -->
    <div id="footer-placeholder"></div>
    
    <!-- External JavaScript -->
    <script src="/js/main.js"></script>
    <script>
        // 타로 카드 데이터
        const tarotCards = [
            { name: "The Fool", korean: "바보", meaning: "새로운 시작, 순수함, 모험" },
            { name: "The Magician", korean: "마법사", meaning: "의지력, 창조, 능력" },
            { name: "The High Priestess", korean: "여교황", meaning: "직감, 신비, 내면의 지혜" },
            { name: "The Empress", korean: "여황제", meaning: "풍요, 창조성, 모성" },
            { name: "The Emperor", korean: "황제", meaning: "권위, 안정, 질서" },
            { name: "The Hierophant", korean: "교황", meaning: "전통, 학습, 영적 지도" },
            { name: "The Lovers", korean: "연인", meaning: "사랑, 선택, 조화" },
            { name: "The Chariot", korean: "전차", meaning: "의지력, 승리, 통제" },
            { name: "Strength", korean: "힘", meaning: "용기, 인내, 내면의 힘" },
            { name: "The Hermit", korean: "은둔자", meaning: "성찰, 내면 탐구, 지혜" },
            { name: "Wheel of Fortune", korean: "운명의 수레바퀴", meaning: "변화, 운명, 순환" },
            { name: "Justice", korean: "정의", meaning: "공정, 균형, 진실" },
            { name: "The Hanged Man", korean: "거꾸로 매달린 남자", meaning: "희생, 관점의 변화, 기다림" },
            { name: "Death", korean: "죽음", meaning: "변화, 끝과 시작, 변신" },
            { name: "Temperance", korean: "절제", meaning: "조화, 균형, 절제" },
            { name: "The Devil", korean: "악마", meaning: "유혹, 속박, 물질주의" },
            { name: "The Tower", korean: "탑", meaning: "급변, 파괴와 재생, 깨달음" },
            { name: "The Star", korean: "별", meaning: "희망, 영감, 치유" },
            { name: "The Moon", korean: "달", meaning: "환상, 직감, 숨겨진 진실" },
            { name: "The Sun", korean: "태양", meaning: "기쁨, 성공, 활력" },
            { name: "Judgement", korean: "심판", meaning: "재생, 용서, 새로운 출발" },
            { name: "The World", korean: "세계", meaning: "완성, 성취, 통합" }
        ];
        
        let currentQuestion = "";
        let currentSpread = "";
        let selectedCards = [];
        
        // 질문 폼 제출
        document.getElementById('tarotQuestionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            currentQuestion = formData.get('tarotQuestion');
            currentSpread = formData.get('spreadType');
            
            showCardSelection();
        });
        
        // 카드 선택 화면 표시
        function showCardSelection() {
            document.getElementById('questionStep').style.display = 'none';
            document.getElementById('cardStep').style.display = 'block';
            
            const cardGrid = document.getElementById('cardGrid');
            cardGrid.innerHTML = '';
            
            // 22장의 카드 뒷면 생성
            for (let i = 0; i < 22; i++) {
                const cardElement = document.createElement('div');
                cardElement.className = 'tarot-card';
                cardElement.onclick = () => selectCard(i);
                cardElement.innerHTML = `
                    <div class="card-back">
                        <div class="card-pattern">🌟</div>
                    </div>
                `;
                cardGrid.appendChild(cardElement);
            }
        }
        
        // 카드 선택
        function selectCard(cardIndex) {
            if (selectedCards.includes(cardIndex)) return;
            
            selectedCards.push(cardIndex);
            
            // 카드 뒤집기 효과
            const cardElement = document.querySelectorAll('.tarot-card')[cardIndex];
            const card = tarotCards[cardIndex];
            
            cardElement.classList.add('flipped');
            cardElement.innerHTML = `
                <div class="card-front">
                    <h4>${card.korean}</h4>
                    <p>${card.name}</p>
                    <div class="card-meaning">${card.meaning}</div>
                </div>
            `;
            
            // 필요한 카드 수만큼 선택했는지 확인
            const requiredCards = {
                'single': 1,
                'three': 3,
                'celtic': 10
            };
            
            if (selectedCards.length >= requiredCards[currentSpread]) {
                setTimeout(() => {
                    showResult();
                }, 1500);
            }
        }
        
        // 결과 표시
        function showResult() {
            document.getElementById('cardStep').style.display = 'none';
            document.getElementById('resultStep').style.display = 'block';
            
            const resultContainer = document.getElementById('tarotResult');
            resultContainer.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <div style="font-size: 3em; margin-bottom: 20px;">🔮</div>
                    <p>AI가 타로 카드를 해석하고 있습니다...</p>
                </div>
            `;
            
            // 모의 해석 생성
            setTimeout(() => {
                displayTarotInterpretation();
            }, 2000);
        }
        
        // 타로 해석 표시
        function displayTarotInterpretation() {
            const selectedCardData = selectedCards.map(index => tarotCards[index]);
            const interpretation = generateMockInterpretation(selectedCardData);
            
            const resultHTML = `
                <div class="tarot-interpretation">
                    <div class="question-display">
                        <h3>🔮 질문</h3>
                        <p>"${currentQuestion}"</p>
                    </div>
                    
                    <div class="selected-cards">
                        <h3>🃏 선택된 카드</h3>
                        <div class="card-display">
                            ${selectedCardData.map((card, index) => `
                                <div class="card-info">
                                    <h4>${card.korean} (${card.name})</h4>
                                    <p>${card.meaning}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="ai-interpretation">
                        <h3>🤖 AI 해석</h3>
                        <div class="interpretation-content">
                            <h4>✨ 전체적인 메시지</h4>
                            <p>${interpretation.overall}</p>
                            
                            <h4>💡 조언</h4>
                            <p>${interpretation.advice}</p>
                            
                            <h4>🔑 핵심 키워드</h4>
                            <p>${interpretation.keywords}</p>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('tarotResult').innerHTML = resultHTML;
        }
        
        // 모의 해석 생성
        function generateMockInterpretation(cards) {
            const interpretations = [
                {
                    overall: "현재 당신은 중요한 변화의 시점에 서 있습니다. 선택한 카드들은 새로운 기회와 성장의 가능성을 보여주고 있어요. 과거의 경험이 현재의 지혜가 되어 미래를 밝게 비춰줄 것입니다.",
                    advice: "직감을 믿고 용기있게 앞으로 나아가세요. 때로는 위험을 감수하는 것이 더 큰 보상을 가져다줄 수 있습니다. 주변 사람들의 조언에 귀 기울이되, 최종 결정은 당신의 마음이 시키는 대로 하세요.",
                    keywords: "변화, 성장, 직감, 용기, 새로운 시작"
                },
                {
                    overall: "지금은 인내와 기다림이 필요한 시기입니다. 서두르지 말고 차분히 상황을 관찰하세요. 당신이 원하는 것은 분명히 이루어질 것이지만, 그 과정에서 많은 것을 배우게 될 것입니다.",
                    advice: "감정에 휩쓸리지 말고 냉정하게 판단하세요. 현재의 어려움은 더 큰 성공을 위한 준비 과정입니다. 자신을 믿고 꾸준히 노력하면 반드시 좋은 결과가 있을 것입니다.",
                    keywords: "인내, 기다림, 성찰, 준비, 신뢰"
                }
            ];
            
            return interpretations[Math.floor(Math.random() * interpretations.length)];
        }
        
        // 질문으로 돌아가기
        function goBackToQuestion() {
            document.getElementById('cardStep').style.display = 'none';
            document.getElementById('questionStep').style.display = 'block';
            selectedCards = [];
        }
        
        // 타로 다시 시작
        function restartTarot() {
            document.getElementById('resultStep').style.display = 'none';
            document.getElementById('questionStep').style.display = 'block';
            selectedCards = [];
            currentQuestion = "";
            currentSpread = "";
            document.getElementById('tarotQuestionForm').reset();
        }
    </script>
    
    <style>
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            margin: 20px 0;
            max-width: 800px;
            margin: 20px auto;
        }
        
        .tarot-card {
            width: 80px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .tarot-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        
        .card-back {
            text-align: center;
            color: white;
        }
        
        .card-pattern {
            font-size: 24px;
            animation: sparkle 2s ease-in-out infinite;
        }
        
        @keyframes sparkle {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        
        .tarot-card.flipped {
            background: white;
            color: #333;
            border: 2px solid #8B5CF6;
        }
        
        .card-front {
            text-align: center;
            padding: 5px;
            font-size: 10px;
        }
        
        .card-front h4 {
            margin: 0 0 5px 0;
            font-size: 11px;
            font-weight: bold;
        }
        
        .card-front p {
            margin: 0 0 5px 0;
            font-size: 8px;
            color: #666;
        }
        
        .card-meaning {
            font-size: 7px;
            color: #8B5CF6;
            font-weight: 500;
        }
        
        .tarot-interpretation {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .question-display,
        .selected-cards,
        .ai-interpretation {
            background: white;
            padding: 24px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .card-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .card-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .card-info h4 {
            color: #8B5CF6;
            margin-bottom: 8px;
        }
        
        .interpretation-content h4 {
            color: #6366F1;
            margin: 20px 0 10px 0;
        }
        
        .interpretation-content p {
            line-height: 1.7;
            color: #374151;
        }
        
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
                gap: 10px;
            }
            
            .tarot-card {
                width: 60px;
                height: 90px;
            }
        }
    </style>
    
    <!-- AdSense initialization -->
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
