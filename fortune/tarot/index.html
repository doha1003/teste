<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 타로 리딩 - 신비로운 타로 카드 해석 | doha.kr</title>
    <meta name="description" content="AI가 해석하는 신비로운 타로 리딩. 질문을 입력하고 카드를 선택하면 AI가 메시지를 전달합니다.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="AI 타로 리딩 - 신비로운 타로 카드 해석">
    <meta property="og:description" content="질문을 하고 카드를 선택하면 AI가 타로의 메시지를 해석해드립니다">
    <meta property="og:image" content="https://doha.kr/images/tarot-og.png">
    <meta property="og:url" content="https://doha.kr/fortune/tarot/">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    
    <!-- Favicon -->
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7905640648499222" crossorigin="anonymous"></script>
    
    <style>
        /* 타로 전용 스타일 */
        .fortune-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .tarot-step {
            margin: 40px 0;
        }
        
        /* 질문 입력 폼 스타일 */
        .fortune-form {
            background: linear-gradient(135deg, #2d1b69 0%, #11998e 100%);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(45, 27, 105, 0.4);
            position: relative;
            overflow: hidden;
            margin-bottom: 40px;
        }
        
        .fortune-form::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="mystical" x="0" y="0" width="25" height="25" patternUnits="userSpaceOnUse"><circle cx="12.5" cy="12.5" r="1" fill="rgba(255,255,255,0.1)"/><path d="M12.5 8 L16 12 L12.5 16 L9 12 Z" fill="rgba(255,255,255,0.05)"/></pattern></defs><rect width="100" height="100" fill="url(%23mystical)"/></svg>');
            animation: mysticalFloat 20s linear infinite;
        }
        
        @keyframes mysticalFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-25px); }
        }
        
        .fortune-form h2 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-size: 28px;
            font-weight: 600;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .form-group {
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }
        
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-bottom: 12px;
            font-size: 16px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .form-control {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-family: inherit;
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .form-control:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 12px;
        }
        
        .radio-label {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            cursor: pointer;
            padding: 16px 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .radio-label::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .radio-label:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .radio-label:hover::before {
            left: 100%;
        }
        
        .radio-label input[type="radio"] {
            width: 20px;
            height: 20px;
            margin: 0;
            accent-color: #11998e;
        }
        
        .radio-label:has(input[type="radio"]:checked) {
            background: rgba(17, 153, 142, 0.3);
            border: 2px solid rgba(17, 153, 142, 0.6);
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.2);
        }
        
        .form-helper-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-helper-text::before {
            content: '🔮';
            font-size: 16px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 32px;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 24px rgba(17, 153, 142, 0.3);
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(17, 153, 142, 0.4);
        }
        
        .submit-btn:hover::before {
            left: 100%;
        }
        
        /* 카드 선택 영역 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 20px;
            margin: 40px 0;
            max-width: 900px;
            margin: 40px auto;
        }
        
        .tarot-card {
            width: 90px;
            height: 140px;
            background: linear-gradient(135deg, #2d1b69 0%, #11998e 100%);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 8px 25px rgba(45, 27, 105, 0.3);
            overflow: hidden;
        }
        
        .tarot-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,255,255,0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .tarot-card:hover {
            transform: translateY(-10px) rotateY(5deg);
            box-shadow: 0 15px 35px rgba(45, 27, 105, 0.4);
        }
        
        .tarot-card:hover::before {
            opacity: 1;
        }
        
        .card-back {
            text-align: center;
            color: white;
            position: relative;
            z-index: 1;
        }
        
        .card-pattern {
            font-size: 32px;
            animation: cardPulse 3s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        
        @keyframes cardPulse {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            50% { transform: scale(1.2) rotate(5deg); opacity: 1; }
        }
        
        .tarot-card.flipped {
            background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
            color: #333;
            border: 3px solid #11998e;
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.3);
        }
        
        .card-front {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: #2d1b69;
            position: relative;
            z-index: 1;
        }
        
        .card-front h4 {
            margin: 0 0 8px 0;
            font-size: 12px;
            font-weight: bold;
            color: #11998e;
        }
        
        .card-front p {
            margin: 0 0 8px 0;
            font-size: 9px;
            color: #666;
        }
        
        .card-meaning {
            font-size: 8px;
            color: #2d1b69;
            font-weight: 500;
            line-height: 1.2;
        }
        
        /* 결과 영역 */
        .tarot-interpretation {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .question-display,
        .selected-cards,
        .ai-interpretation {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 32px;
            margin-bottom: 24px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .question-display::before,
        .selected-cards::before,
        .ai-interpretation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="stars2" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="0.8" fill="rgba(255,255,255,0.1)"/></pattern></defs><rect width="100" height="100" fill="url(%23stars2)"/></svg>');
            animation: sparkle2 12s linear infinite;
        }
        
        @keyframes sparkle2 {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(360deg); }
        }
        
        .question-display h3,
        .selected-cards h3,
        .ai-interpretation h3 {
            position: relative;
            z-index: 1;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .question-display p {
            position: relative;
            z-index: 1;
            font-size: 18px;
            font-style: italic;
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid rgba(255,255,255,0.3);
        }
        
        .card-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }
        
        .card-info {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .card-info:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
        }
        
        .card-info h4 {
            color: #ffd700;
            margin-bottom: 12px;
            font-size: 18px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.2);
        }
        
        .card-info p {
            opacity: 0.9;
            line-height: 1.4;
        }
        
        .interpretation-content {
            position: relative;
            z-index: 1;
        }
        
        .interpretation-content h4 {
            color: #ffd700;
            margin: 24px 0 12px 0;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .interpretation-content p {
            line-height: 1.8;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        /* 버튼 스타일 */
        .back-btn,
        .restart-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            border: none;
            border-radius: 25px;
            padding: 15px 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(255, 107, 107, 0.3);
            margin: 0 10px;
        }
        
        .back-btn:hover,
        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 107, 107, 0.4);
        }
        
        /* 로딩 스타일 */
        .loading-container {
            text-align: center;
            padding: 60px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .loading-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="loading" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse"><circle cx="7.5" cy="7.5" r="0.8" fill="rgba(255,255,255,0.1)"/></pattern></defs><rect width="100" height="100" fill="url(%23loading)"/></svg>');
            animation: loadingFloat 8s linear infinite;
        }
        
        @keyframes loadingFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }
        
        .loading-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
            animation: loadingPulse 2s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }
        
        @keyframes loadingPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.3) rotate(10deg); }
        }
        
        .loading-text {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }
        
        .loading-subtext {
            font-size: 16px;
            opacity: 0.8;
            position: relative;
            z-index: 1;
        }
        
        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .fortune-form {
                padding: 32px 24px;
                margin: 0 16px 32px;
            }
            
            .fortune-form h2 {
                font-size: 24px;
            }
            
            .radio-group {
                gap: 12px;
            }
            
            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 15px;
            }
            
            .tarot-card {
                width: 70px;
                height: 110px;
            }
            
            .card-pattern {
                font-size: 24px;
            }
            
            .question-display,
            .selected-cards,
            .ai-interpretation {
                padding: 24px 20px;
                margin: 0 16px 20px;
            }
            
            .card-display {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 네비게이션 -->
    <div id="navbar-placeholder"></div>
    
    <div class="fortune-container">
        <div class="hero">
            <div class="hero-content">
                <h1 class="hero-title fade-in">🃏 AI 타로 리딩</h1>
                <p class="hero-subtitle fade-in stagger-1">AI가 해석하는 신비로운 타로 카드의 메시지</p>
            </div>
        </div>
        
        <div class="features">
            <div class="container">
                <!-- 질문 입력 단계 -->
                <div id="questionStep" class="tarot-step">
                    <form id="tarotQuestionForm" class="fortune-form">
                        <h2>🔮 질문을 입력하세요 ✨</h2>
                        
                        <div class="form-group">
                            <label for="tarotQuestion">🌟 궁금한 것을 질문해주세요</label>
                            <textarea 
                                id="tarotQuestion" 
                                name="tarotQuestion" 
                                class="form-control" 
                                rows="4" 
                                required 
                                placeholder="예: 앞으로의 연애운은 어떨까요? 새로운 직장에서 잘 적응할 수 있을까요?"
                                style="resize: vertical;"
                            ></textarea>
                            <div class="form-helper-text">
                                구체적이고 명확한 질문일수록 더 정확한 답변을 받을 수 있습니다
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>🃏 타로 스프레드 선택</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="spreadType" value="single" required checked>
                                    <span>⚡ 원카드 리딩 (빠른 답변)</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="spreadType" value="three" required>
                                    <span>🔺 쓰리카드 리딩 (과거-현재-미래)</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="spreadType" value="celtic" required>
                                    <span>✨ 셀틱 크로스 (상세 분석)</span>
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="submit-btn">
                            🎴 카드 선택하기
                        </button>
                    </form>
                </div>
                
                <!-- 카드 선택 단계 -->
                <div id="cardStep" class="tarot-step" style="display: none;">
                    <h2 style="text-align: center; margin-bottom: 20px; color: #2d1b69;">🎴 카드를 선택하세요</h2>
                    <p style="text-align: center; margin-bottom: 40px; color: #6b7280; font-size: 18px;">
                        🧘‍♀️ 직감을 믿고 끌리는 카드를 선택해주세요
                    </p>
                    
                    <div id="cardGrid" class="card-grid">
                        <!-- 카드들이 여기에 동적으로 생성됩니다 -->
                    </div>
                    
                    <div style="text-align: center; margin-top: 30px;">
                        <button onclick="goBackToQuestion()" class="back-btn">
                            ↩️ 질문 다시 입력
                        </button>
                    </div>
                </div>
                
                <!-- 결과 단계 -->
                <div id="resultStep" class="tarot-step" style="display: none;">
                    <h2 style="text-align: center; margin-bottom: 30px; color: #2d1b69;">✨ 타로 리딩 결과</h2>
                    
                    <div id="tarotResult">
                        <!-- 결과가 여기에 표시됩니다 -->
                    </div>
                    
                    <div style="text-align: center; margin-top: 30px;">
                        <button onclick="restartTarot()" class="restart-btn">
                            🔄 새로운 질문하기
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 광고 영역 -->
        <div class="ad-container">
            <div class="ad-label">광고</div>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7905640648499222"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>
    
    <!-- 푸터 -->
    <div id="footer-placeholder"></div>
    
    <!-- External JavaScript -->
    <script src="/js/main.js"></script>
    <script>
        // 타로 카드 데이터
        const tarotCards = [
            { name: "The Fool", korean: "바보", meaning: "새로운 시작, 순수함, 모험" },
            { name: "The Magician", korean: "마법사", meaning: "의지력, 창조, 능력" },
            { name: "The High Priestess", korean: "여교황", meaning: "직감, 신비, 내면의 지혜" },
            { name: "The Empress", korean: "여황제", meaning: "풍요, 창조성, 모성" },
            { name: "The Emperor", korean: "황제", meaning: "권위, 안정, 질서" },
            { name: "The Hierophant", korean: "교황", meaning: "전통, 학습, 영적 지도" },
            { name: "The Lovers", korean: "연인", meaning: "사랑, 선택, 조화" },
            { name: "The Chariot", korean: "전차", meaning: "의지력, 승리, 통제" },
            { name: "Strength", korean: "힘", meaning: "용기, 인내, 내면의 힘" },
            { name: "The Hermit", korean: "은둔자", meaning: "성찰, 내면 탐구, 지혜" },
            { name: "Wheel of Fortune", korean: "운명의 수레바퀴", meaning: "변화, 운명, 순환" },
            { name: "Justice", korean: "정의", meaning: "공정, 균형, 진실" },
            { name: "The Hanged Man", korean: "거꾸로 매달린 남자", meaning: "희생, 관점의 변화, 기다림" },
            { name: "Death", korean: "죽음", meaning: "변화, 끝과 시작, 변신" },
            { name: "Temperance", korean: "절제", meaning: "조화, 균형, 절제" },
            { name: "The Devil", korean: "악마", meaning: "유혹, 속박, 물질주의" },
            { name: "The Tower", korean: "탑", meaning: "급변, 파괴와 재생, 깨달음" },
            { name: "The Star", korean: "별", meaning: "희망, 영감, 치유" },
            { name: "The Moon", korean: "달", meaning: "환상, 직감, 숨겨진 진실" },
            { name: "The Sun", korean: "태양", meaning: "기쁨, 성공, 활력" },
            { name: "Judgement", korean: "심판", meaning: "재생, 용서, 새로운 출발" },
            { name: "The World", korean: "세계", meaning: "완성, 성취, 통합" }
        ];
        
        let currentQuestion = "";
        let currentSpread = "";
        let selectedCards = [];
        
        // 질문 폼 제출
        document.getElementById('tarotQuestionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            currentQuestion = formData.get('tarotQuestion');
            currentSpread = formData.get('spreadType');
            
            showCardSelection();
        });
        
        // 카드 선택 화면 표시
        function showCardSelection() {
            document.getElementById('questionStep').style.display = 'none';
            document.getElementById('cardStep').style.display = 'block';
            
            const cardGrid = document.getElementById('cardGrid');
            cardGrid.innerHTML = '';
            
            // 22장의 카드 뒷면 생성
            for (let i = 0; i < 22; i++) {
                const cardElement = document.createElement('div');
                cardElement.className = 'tarot-card';
                cardElement.onclick = () => selectCard(i);
                cardElement.innerHTML = `
                    <div class="card-back">
                        <div class="card-pattern">🌟</div>
                    </div>
                `;
                cardGrid.appendChild(cardElement);
            }
            
            // 카드 선택 영역으로 스크롤
            document.getElementById('cardStep').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        // 카드 선택
        function selectCard(cardIndex) {
            if (selectedCards.includes(cardIndex)) return;
            
            selectedCards.push(cardIndex);
            
            // 카드 뒤집기 효과
            const cardElement = document.querySelectorAll('.tarot-card')[cardIndex];
            const card = tarotCards[cardIndex];
            
            cardElement.classList.add('flipped');
            cardElement.innerHTML = `
                <div class="card-front">
                    <h4>${card.korean}</h4>
                    <p>${card.name}</p>
                    <div class="card-meaning">${card.meaning}</div>
                </div>
            `;
            
            // 필요한 카드 수만큼 선택했는지 확인
            const requiredCards = {
                'single': 1,
                'three': 3,
                'celtic': 10
            };
            
            if (selectedCards.length >= requiredCards[currentSpread]) {
                setTimeout(() => {
                    showResult();
                }, 2000);
            }
        }
        
        // 결과 표시
        function showResult() {
            document.getElementById('cardStep').style.display = 'none';
            document.getElementById('resultStep').style.display = 'block';
            
            const resultContainer = document.getElementById('tarotResult');
            resultContainer.innerHTML = `
                <div class="loading-container">
                    <span class="loading-emoji">🔮</span>
                    <div class="loading-text">AI가 타로 카드의 신비로운 메시지를 해석하고 있습니다</div>
                    <div class="loading-subtext">우주의 에너지를 분석 중...</div>
                </div>
            `;
            
            // 결과 영역으로 스크롤
            document.getElementById('resultStep').scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // 모의 해석 생성
            setTimeout(() => {
                displayTarotInterpretation();
            }, 3000);
        }
        
        // 타로 해석 표시
        function displayTarotInterpretation() {
            const selectedCardData = selectedCards.map(index => tarotCards[index]);
            const interpretation = generateMockInterpretation(selectedCardData);
            
            const resultHTML = `
                <div class="tarot-interpretation">
                    <div class="question-display">
                        <h3>🔮 당신의 질문</h3>
                        <p>"${currentQuestion}"</p>
                    </div>
                    
                    <div class="selected-cards">
                        <h3>🃏 선택된 신성한 카드</h3>
                        <div class="card-display">
                            ${selectedCardData.map((card, index) => `
                                <div class="card-info">
                                    <h4>${card.korean} (${card.name})</h4>
                                    <p>${card.meaning}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="ai-interpretation">
                        <h3>🤖 AI의 신비로운 해석</h3>
                        <div class="interpretation-content">
                            <h4>✨ 카드가 전하는 전체적인 메시지</h4>
                            <p>${interpretation.overall}</p>
                            
                            <h4>💡 우주가 주는 조언</h4>
                            <p>${interpretation.advice}</p>
                            
                            <h4>🔑 오늘의 핵심 키워드</h4>
                            <p>${interpretation.keywords}</p>
                            
                            <h4>🌟 행동 지침</h4>
                            <p>${interpretation.action}</p>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('tarotResult').innerHTML = resultHTML;
        }
        
        // 모의 해석 생성
        function generateMockInterpretation(cards) {
            const interpretations = [
                {
                    overall: "당신이 선택한 카드들은 강력한 변화의 에너지를 품고 있습니다. 우주는 지금이 새로운 장을 열기에 완벽한 시기라고 말하고 있어요. 과거의 제약에서 벗어나 진정한 자신을 찾아가는 여정이 시작되었습니다.",
                    advice: "두려움에 맞서는 용기를 가지세요. 당신 안에 잠재된 힘은 상상보다 훨씬 크답니다. 직감을 믿고 마음이 이끄는 방향으로 한 걸음씩 나아가세요. 때로는 예상치 못한 길이 가장 아름다운 목적지로 인도하기도 합니다.",
                    keywords: "변화, 용기, 직감, 새로운 시작, 내면의 힘",
                    action: "이번 주에는 평소 미뤄왔던 일을 시작해보세요. 새로운 사람들과의 만남을 두려워하지 말고, 자신의 감정과 생각을 솔직하게 표현하는 연습을 해보세요."
                },
                {
                    overall: "현재 당신은 중요한 선택의 기로에 서 있습니다. 카드들은 신중함과 동시에 과감함이 필요한 시점이라고 말하고 있어요. 균형을 잃지 않으면서도 변화를 받아들이는 지혜가 필요합니다.",
                    advice: "모든 상황을 통제하려 하지 마세요. 때로는 흐름에 맡기는 것이 더 좋은 결과를 가져다줍니다. 주변 사람들의 조언에 귀 기울이되, 최종 결정은 당신의 내면의 소리를 따라 하세요.",
                    keywords: "균형, 선택, 지혜, 신중함, 흐름",
                    action: "명상이나 조용한 시간을 가져 자신의 마음을 들여다보세요. 중요한 결정은 서두르지 말고 충분히 고민한 후에 내리는 것이 좋겠습니다."
                },
                {
                    overall: "사랑과 관계에서 새로운 전환점이 다가오고 있습니다. 카드들은 진정한 연결과 깊은 이해가 가능한 시기라고 전하고 있어요. 마음을 열고 소통하는 것이 열쇠가 될 것입니다.",
                    advice: "완벽함을 추구하기보다는 진정성을 택하세요. 당신의 진짜 모습을 보여주는 것을 두려워하지 마세요. 상대방도 똑같이 불완전한 인간이라는 것을 기억하고, 서로의 차이를 인정하고 받아들이세요.",
                    keywords: "사랑, 소통, 진정성, 이해, 연결",
                    action: "가까운 사람들에게 감사의 마음을 표현해보세요. 오랫동안 연락하지 못했던 사람에게 안부를 묻거나, 소중한 사람과 깊은 대화의 시간을 가져보세요."
                }
            ];
            
            return interpretations[Math.floor(Math.random() * interpretations.length)];
        }
        
        // 질문으로 돌아가기
        function goBackToQuestion() {
            document.getElementById('cardStep').style.display = 'none';
            document.getElementById('questionStep').style.display = 'block';
            selectedCards = [];
            
            // 질문 폼으로 스크롤
            document.getElementById('questionStep').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        // 타로 다시 시작
        function restartTarot() {
            document.getElementById('resultStep').style.display = 'none';
            document.getElementById('questionStep').style.display = 'block';
            selectedCards = [];
            currentQuestion = "";
            currentSpread = "";
            document.getElementById('tarotQuestionForm').reset();
            
            // 질문 폼으로 스크롤
            document.getElementById('questionStep').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
