    <script>
        // 메이저 아르카나 22장 카드 데이터
        const majorArcana = [
            { id: 0, name: "The Fool", korean: "바보", meaning: "새로운 시작, 순수함, 모험", reversed: "무모함, 경솔함, 방향감각 상실" },
            { id: 1, name: "The Magician", korean: "마법사", meaning: "의지력, 창조력, 능력", reversed: "속임수, 능력 부족, 자만심" },
            { id: 2, name: "The High Priestess", korean: "여교황", meaning: "직관, 신비, 내면의 지혜", reversed: "비밀, 무지, 표면적 지식" },
            { id: 3, name: "The Empress", korean: "여황제", meaning: "풍요, 창조, 모성", reversed: "의존, 과보호, 창조력 부족" },
            { id: 4, name: "The Emperor", korean: "황제", meaning: "권위, 안정, 지배", reversed: "독단, 경직, 폭정" },
            { id: 5, name: "The Hierophant", korean: "교황", meaning: "전통, 종교, 교육", reversed: "독단, 형식주의, 반항" },
            { id: 6, name: "The Lovers", korean: "연인", meaning: "사랑, 선택, 결합", reversed: "분리, 갈등, 잘못된 선택" },
            { id: 7, name: "The Chariot", korean: "전차", meaning: "의지, 승리, 통제", reversed: "패배, 방향감각 상실, 통제 불능" },
            { id: 8, name: "Strength", korean: "힘", meaning: "용기, 인내, 내적 힘", reversed: "약함, 의심, 자제력 부족" },
            { id: 9, name: "The Hermit", korean: "은둔자", meaning: "성찰, 내적 인도, 지혜", reversed: "고립, 외로움, 거부" },
            { id: 10, name: "Wheel of Fortune", korean: "운명의 바퀴", meaning: "변화, 운명, 기회", reversed: "불운, 통제 불능, 악순환" },
            { id: 11, name: "Justice", korean: "정의", meaning: "공정, 균형, 진실", reversed: "불공정, 편견, 거짓" },
            { id: 12, name: "The Hanged Man", korean: "매달린 사람", meaning: "희생, 새로운 관점, 기다림", reversed: "헛된 희생, 지연, 이기심" },
            { id: 13, name: "Death", korean: "죽음", meaning: "변화, 재생, 끝과 시작", reversed: "정체, 변화에 대한 저항" },
            { id: 14, name: "Temperance", korean: "절제", meaning: "조화, 균형, 절제", reversed: "불균형, 과도함, 불화" },
            { id: 15, name: "The Devil", korean: "악마", meaning: "유혹, 속박, 물질주의", reversed: "해방, 깨달음, 자유" },
            { id: 16, name: "The Tower", korean: "탑", meaning: "파괴, 갑작스런 변화, 깨달음", reversed: "피할 수 있는 재앙, 내적 변화" },
            { id: 17, name: "The Star", korean: "별", meaning: "희망, 영감, 치유", reversed: "절망, 환멸, 영감 부족" },
            { id: 18, name: "The Moon", korean: "달", meaning: "환상, 불안, 무의식", reversed: "혼란 해소, 진실 발견" },
            { id: 19, name: "The Sun", korean: "태양", meaning: "기쁨, 성공, 활력", reversed: "과신, 오만, 에너지 부족" },
            { id: 20, name: "Judgement", korean: "심판", meaning: "부활, 깨달음, 용서", reversed: "후회, 자기 비판, 용서 부족" },
            { id: 21, name: "The World", korean: "세계", meaning: "완성, 성취, 통합", reversed: "미완성, 좌절, 부족함" }
        ];
        
        // 스프레드 타입 정의
        const spreads = {
            oneCard: { name: "원 카드", count: 1, positions: ["현재 상황"] },
            threeCard: { name: "쓰리 카드", count: 3, positions: ["과거", "현재", "미래"] },
            celtic: { name: "켈틱 크로스", count: 10, positions: ["현재 상황", "도전/십자가", "먼 과거", "가까운 과거", "가능한 미래", "가까운 미래", "자신", "외부 영향", "희망과 두려움", "최종 결과"] }
        };
        
        async function startTarotReading() {
            const question = document.getElementById('question').value.trim();
            const spreadType = document.getElementById('spreadType').value;
            
            if (!question) {
                alert('질문을 입력해주세요.');
                return;
            }
            
            // 폼 숨기기
            document.getElementById('tarotForm').style.display = 'none';
            
            // 로딩 표시
            const resultDiv = document.getElementById('tarotResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div class="tarot-ai-analyzing">
                    🔮 AI가 당신의 질문을 분석하고 타로 카드를 해석하고 있습니다...<br>
                    <small style="opacity: 0.7; margin-top: 10px; display: block;">질문: "${question}"</small>
                </div>
            `;
            
            try {
                // 카드 뽑기
                const cards = drawCards(question, spreadType);
                
                // AI 분석 시도
                const aiAnalysis = await generateTarotAnalysisWithAI(question, cards, spreadType);
                
                // 결과 표시
                displayTarotResult(question, cards, spreadType, aiAnalysis);
                
            } catch (error) {
                console.error('타로 분석 오류:', error);
                // 오류 시 질문 기반 개선된 해석 사용
                const cards = drawCards(question, spreadType);
                const improvedAnalysis = generateQuestionBasedAnalysis(question, cards, spreadType);
                displayTarotResult(question, cards, spreadType, improvedAnalysis);
            }
        }
        
        function drawCards(question, spreadType) {
            const spread = spreads[spreadType];
            const cards = [];
            
            // 질문을 기반으로 시드 생성
            const seed = generateSeed(question);
            
            for (let i = 0; i < spread.count; i++) {
                const cardIndex = Math.floor(seededRandom(seed + i) * majorArcana.length);
                const isReversed = seededRandom(seed + i + 100) < 0.25; // 25% 확률로 역방향
                
                cards.push({
                    ...majorArcana[cardIndex],
                    reversed: isReversed,
                    position: spread.positions[i]
                });
            }
            
            return cards;
        }
        
        function generateSeed(text) {
            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                const char = text.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // 32비트 정수로 변환
            }
            return Math.abs(hash);
        }
        
        function seededRandom(seed) {
            const x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }
        
        // 실제 AI 분석 함수
        async function generateTarotAnalysisWithAI(question, cards, spreadType) {
            const spread = spreads[spreadType];
            const cardDescriptions = cards.map(card => 
                `${card.position}: ${card.korean}(${card.name}) ${card.reversed ? '역방향' : '정방향'} - 기본의미: ${card.reversed ? card.reversed : card.meaning}`
            ).join(', ');
            
            const prompt = `당신은 전문 타로 리더입니다. 다음 질문과 뽑힌 카드들을 바탕으로 상세한 타로 리딩을 해주세요.

질문: "${question}"
스프레드: ${spread.name}
뽑힌 카드들: ${cardDescriptions}

반드시 질문의 내용과 연결하여 해석하고, 다음 JSON 형식으로 응답해주세요:
{
  "overall": "질문과 관련된 전체적인 메시지 (100-200자)",
  "cardAnalysis": [
    {
      "position": "포지션명",
      "interpretation": "질문 맥락에서의 해당 카드 해석 (80-120자)"
    }
  ],
  "advice": "질문자에게 구체적인 조언 (100-150자)",
  "futureGuidance": "질문과 관련된 미래 가이드 (80-120자)"
}

질문의 주제(연애, 직업, 인간관계 등)에 맞춰 카드의 의미를 해석하고 실용적인 조언을 포함해주세요.`;

            try {
                const aiResponse = await callGeminiAPI(prompt);
                
                if (aiResponse) {
                    const cleanResponse = aiResponse.replace(/```json|```/g, '').trim();
                    const parsed = JSON.parse(cleanResponse);
                    return parsed;
                }
            } catch (error) {
                console.error('AI 분석 파싱 오류:', error);
            }
            
            return null;
        }
        
        // 질문 기반 개선된 분석 (AI 실패 시)
        function generateQuestionBasedAnalysis(question, cards, spreadType) {
            const spread = spreads[spreadType];
            
            // 질문에서 키워드 추출
            const questionKeywords = extractQuestionKeywords(question);
            
            const cardAnalysis = cards.map(card => ({
                position: card.position,
                interpretation: generateContextualInterpretation(card, question, questionKeywords)
            }));
            
            return {
                overall: generateQuestionBasedOverall(question, cards, questionKeywords),
                cardAnalysis: cardAnalysis,
                advice: generateQuestionBasedAdvice(question, cards, questionKeywords),
                futureGuidance: generateQuestionBasedGuidance(question, cards, questionKeywords)
            };
        }
        
        function extractQuestionKeywords(question) {
            const keywords = {
                love: ['연애', '사랑', '연인', '남친', '여친', '결혼', '이별', '썸', '짝사랑'],
                career: ['직업', '일', '회사', '사업', '취업', '이직', '승진', '동료', '상사'],
                money: ['돈', '재정', '투자', '사업', '경제', '수입', '지출', '부채'],
                family: ['가족', '부모', '자식', '형제', '친척', '집안'],
                health: ['건강', '병', '치료', '의료', '몸', '정신'],
                study: ['공부', '시험', '학교', '대학', '성적', '학습'],
                friendship: ['친구', '우정', '인간관계', '사회생활']
            };
            
            const foundKeywords = [];
            for (const [category, words] of Object.entries(keywords)) {
                if (words.some(word => question.includes(word))) {
                    foundKeywords.push(category);
                }
            }
            
            return foundKeywords.length > 0 ? foundKeywords : ['general'];
        }
        
        function generateContextualInterpretation(card, question, keywords) {
            const cardMeaning = card.reversed ? card.reversed : card.meaning;
            
            const contextualInterpretations = {
                love: {
                    '바보': card.reversed ? '연애에서 성급한 결정을 피하세요.' : '새로운 만남이나 관계의 시작을 의미합니다.',
                    '마법사': card.reversed ? '상대방을 조종하려 하지 마세요.' : '적극적인 어프로치가 성공할 것입니다.',
                    '여교황': card.reversed ? '감정을 숨기지 말고 솔직해지세요.' : '직감을 믿고 마음의 소리를 들어보세요.',
                    '연인': card.reversed ? '관계에 갈등이 있을 수 있습니다.' : '진정한 사랑을 찾거나 관계가 발전할 것입니다.',
                    '죽음': card.reversed ? '과거에 매달리지 말고 앞으로 나아가세요.' : '관계의 새로운 단계나 변화가 필요합니다.'
                },
                career: {
                    '마법사': card.reversed ? '능력을 과시하기보다 겸손해지세요.' : '당신의 능력과 기술이 인정받을 것입니다.',
                    '황제': card.reversed ? '독단적인 결정은 피하세요.' : '리더십을 발휘하여 목표를 달성할 것입니다.',
                    '전차': card.reversed ? '계획을 재검토하고 방향을 수정하세요.' : '강한 의지로 어려움을 극복할 것입니다.',
                    '운명의 바퀴': card.reversed ? '현재의 어려움은 일시적입니다.' : '좋은 기회가 찾아올 것입니다.',
                    '세계': card.reversed ? '목표 달성을 위해 더 노력이 필요합니다.' : '큰 성취와 성공을 이룰 것입니다.'
                }
            };
            
            // 키워드에 맞는 해석이 있다면 사용
            for (const keyword of keywords) {
                if (contextualInterpretations[keyword] && contextualInterpretations[keyword][card.korean]) {
                    return contextualInterpretations[keyword][card.korean];
                }
            }
            
            // 기본 해석에 질문 맥락 추가
            const questionContext = keywords.includes('love') ? '연애와 관련하여' :
                                  keywords.includes('career') ? '직업적인 측면에서' :
                                  keywords.includes('money') ? '금전적인 면에서' : '현재 상황에서';
            
            return `${questionContext} ${cardMeaning.toLowerCase()}의 에너지가 강하게 나타납니다.`;
        }
        
        function generateQuestionBasedOverall(question, cards, keywords) {
            const mainTheme = keywords[0] || 'general';
            const cardCount = cards.length;
            
            const overallMessages = {
                love: `연애와 관련된 질문에 대해 ${cardCount}장의 카드가 답변하고 있습니다. 전반적으로 감정과 관계의 흐름에 주목해야 할 시기입니다.`,
                career: `직업과 관련된 고민에 대해 카드들이 명확한 방향을 제시하고 있습니다. 당신의 능력과 노력이 결실을 맺을 것입니다.`,
                money: `재정 상황에 대한 질문에 카드들이 신중한 접근을 권하고 있습니다. 현명한 판단이 필요한 시기입니다.`,
                general: `당신의 질문에 대해 카드들이 다각도의 통찰을 제공하고 있습니다. 변화와 성장의 기회가 있습니다.`
            };
            
            return overallMessages[mainTheme];
        }
        
        function generateQuestionBasedAdvice(question, cards, keywords) {
            const mainTheme = keywords[0] || 'general';
            
            const adviceMessages = {
                love: '마음을 열고 솔직한 소통을 하세요. 서둘러 결론내지 말고 충분한 시간을 가지며 관계를 발전시키세요.',
                career: '당신의 전문성을 키우고 새로운 기회에 적극적으로 도전하세요. 동료들과의 협력도 중요합니다.',

            return adviceMessages[mainTheme];
        }
        
        function generateQuestionBasedGuidance(question, cards, keywords) {
            const mainTheme = keywords[0] || 'general';
            
            const guidanceMessages = {
                love: '진정한 마음의 연결을 찾게 될 것입니다. 인내심을 가지고 기다리세요.',
                career: '노력한 만큼의 성과를 얻을 것입니다. 지속적인 발전이 기대됩니다.',
                money: '안정적인 재정 상태를 만들어갈 수 있을 것입니다. 현명한 선택이 도움이 됩니다.',
                general: '내면의 성장과 함께 외적인 변화도 따라올 것입니다. 긍정적인 마음을 유지하세요.'
            };
            
            return guidanceMessages[mainTheme];
        }
        
        function displayTarotResult(question, cards, spreadType, analysis) {
            const spread = spreads[spreadType];
            const resultDiv = document.getElementById('tarotResult');
            
            let cardDisplayHTML = '';
            
            if (spread.count === 1) {
                // 원 카드 레이아웃
                cardDisplayHTML = `
                    <div class="single-card-layout">
                        <div class="card-container ${cards[0].reversed ? 'reversed' : ''}">

                                <div class="card-symbol">🃏</div>
                                <div class="card-name">${cards[0].korean}</div>
                                <div class="card-english">${cards[0].name}</div>
                                ${cards[0].reversed ? '<div class="reversed-badge">역방향</div>' : ''}
                            </div>
                        </div>
                        <div class="card-interpretation">
                            <h4>${cards[0].position}</h4>
                            <p>${analysis.cardAnalysis[0].interpretation}</p>
                        </div>
                    </div>
                `;
            } else if (spread.count === 3) {
                // 쓰리 카드 레이아웃
                cardDisplayHTML = `
                    <div class="three-card-layout">
                        ${cards.map((card, index) => `
                            <div class="card-position">
                                <div class="card-container ${card.reversed ? 'reversed' : ''}">
                                    <div class="card-visual">
                                        <div class="card-symbol">🃏</div>
                                        <div class="card-name">${card.korean}</div>
                                        <div class="card-english">${card.name}</div>
                                        ${card.reversed ? '<div class="reversed-badge">역방향</div>' : ''}
                                    </div>
                                </div>
                                <div class="position-label">${card.position}</div>
                                <div class="card-interpretation">
                                    <p>${analysis.cardAnalysis[index].interpretation}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else {
                // 켈틱 크로스 레이아웃
                cardDisplayHTML = `
                    <div class="celtic-cross-layout">
                        <div class="celtic-grid">
                            ${cards.map((card, index) => `
                                <div class="celtic-position position-${index + 1}">
                                    <div class="mini-card ${card.reversed ? 'reversed' : ''}">
                                        <div class="mini-symbol">🃏</div>
                                        <div class="mini-name">${card.korean}</div>
                                        ${card.reversed ? '<div class="mini-reversed">R</div>' : ''}
                                    </div>
                                    <div class="position-label">${card.position}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="celtic-interpretations">
                            ${cards.map((card, index) => `
                                <div class="celtic-interpretation">
                                    <h4>${index + 1}. ${card.position}</h4>
                                    <p><strong>${card.korean}</strong> - ${analysis.cardAnalysis[index].interpretation}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            resultDiv.innerHTML = `
                <div class="tarot-result-container">
                    <h2 style="text-align: center; margin-bottom: 30px;">🔮 타로 리딩 결과</h2>
                    
                    <div class="question-display">
                        <h3>📝 질문</h3>
                        <p>"${question}"</p>
                    </div>
                    
                    <div class="cards-display">
                        <h3>🃏 뽑힌 카드 (${spread.name})</h3>
                        ${cardDisplayHTML}
                    </div>
                    
                    <div class="overall-message">
                        <h3>🔍 전체 메시지</h3>
                        <p>${analysis.overall}</p>
                    </div>
                    
                    <div class="advice-section">
                        <h3>💡 조언</h3>
                        <p>${analysis.advice}</p>
                    </div>
                    
                    <div class="future-guidance">
                        <h3>🌟 미래 가이드</h3>
                        <p>${analysis.futureGuidance}</p>
                    </div>
                    
                    <div class="ai-disclaimer">
                        <small>※ 본 타로 리딩은 AI가 당신의 질문을 분석하여 제공하는 개인화된 해석입니다.</small>
                    </div>
                    
                    <div style="text-align: center; margin-top: 40px;">
                        <button onclick="location.reload()" class="btn btn-secondary">

            `;
        }
