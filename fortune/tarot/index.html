        async function startTarotReading() {
            const category = document.getElementById('category').value;
            const spreadType = document.getElementById('spreadType').value;
            
            // 폼 숨기기
            document.getElementById('tarotForm').style.display = 'none';
            
            // 로딩 표시
            const resultDiv = document.getElementById('tarotResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div class="tarot-ai-analyzing">
                    🔮 AI가 ${categoryTemplates[category].name}에 대한 타로 카드를 해석하고 있습니다...<br>
                    <small style="opacity: 0.7; margin-top: 10px; display: block;">카테고리: ${categoryTemplates[category].name}</small>
                </div>
            `;
            
            try {
                // 카드 뽑기
                const cards = drawCards(category, spreadType);
                
                // 카테고리별 맞춤 분석
                const analysis = await generateCategoryAnalysis(category, cards, spreadType);
                
                // 결과 표시
                displayTarotResult(category, cards, spreadType, analysis);
                
            } catch (error) {
                console.error('타로 분석 오류:', error);
                // 오류 시 기본 해석 사용
                const cards = drawCards(category, spreadType);
                const basicAnalysis = generateBasicAnalysis(category, cards, spreadType);
                displayTarotResult(category, cards, spreadType, basicAnalysis);
            }
        }
        
        function drawCards(category, spreadType) {
            const spread = spreads[spreadType];
            const cards = [];
            
            // 카테고리와 현재 시간을 기반으로 시드 생성
            const seed = generateSeed(category + new Date().toDateString());
            
            for (let i = 0; i < spread.count; i++) {
                const cardIndex = Math.floor(seededRandom(seed + i) * majorArcana.length);
                const isReversed = seededRandom(seed + i + 100) < 0.25; // 25% 확률로 역방향
                
                cards.push({
                    ...majorArcana[cardIndex],
                    reversed: isReversed,
                    position: spread.positions[i]
                });
            }
            
            return cards;
        }
        
        function generateSeed(text) {
            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                const char = text.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // 32비트 정수로 변환
            }
            return Math.abs(hash);
        }
        
        function seededRandom(seed) {
            const x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }
        
        // 카테고리별 맞춤 분석 생성
        async function generateCategoryAnalysis(category, cards, spreadType) {
            const spread = spreads[spreadType];
            const categoryInfo = categoryTemplates[category];
            
            const cardDescriptions = cards.map(card => 
                `${card.position}: ${card.korean}(${card.name}) ${card.reversed ? '역방향' : '정방향'} - ${card.reversed ? card.reversed : card.meaning}`
            ).join(', ');
            
            const prompt = `당신은 전문 타로 리더입니다. ${categoryInfo.name}에 대한 타로 리딩을 해주세요.

카테고리: ${categoryInfo.name}
스프레드: ${spread.name}
뽑힌 카드들: ${cardDescriptions}

${categoryInfo.name}의 관점에서 각 카드를 해석하고, 다음 JSON 형식으로 응답해주세요:

{
  "overall": "${categoryInfo.name}에 대한 전체적인 메시지 (100-200자)",
  "cardAnalysis": [
    {
      "position": "포지션명",
      "interpretation": "${categoryInfo.name} 관점에서의 해당 카드 해석 (80-120자)"
    }
  ],
  "advice": "${categoryInfo.name}에 대한 구체적인 조언 (100-150자)",
  "futureGuidance": "${categoryInfo.name}과 관련된 미래 가이드 (80-120자)"
}

${categoryInfo.name}의 특성에 맞춰 실용적이고 구체적인 해석을 제공해주세요.`;

            try {
                const aiResponse = await callGeminiAPI(prompt);
                
                if (aiResponse) {
                    const cleanResponse = aiResponse.replace(/```json|```/g, '').trim();
                    const parsed = JSON.parse(cleanResponse);
                    return parsed;
                }
            } catch (error) {
                console.error('AI 분석 파싱 오류:', error);
            }
            
            // AI 실패 시 기본 분석 사용
            return generateBasicAnalysis(category, cards, spreadType);
        }
        
        // 기본 분석 생성 (AI 실패 시)
        function generateBasicAnalysis(category, cards, spreadType) {
            const categoryInfo = categoryTemplates[category];
            
            const cardAnalysis = cards.map(card => ({
                position: card.position,
                interpretation: generateCategoryInterpretation(card, category)
            }));
            
            return {
                overall: categoryInfo.overall,
                cardAnalysis: cardAnalysis,
                advice: generateCategoryAdvice(category, cards),
                futureGuidance: generateCategoryGuidance(category, cards)
            };
        }

                    '마법사': card.reversed ? '상대방을 조종하려 하지 말고 진실된 마음으로 대하세요.' : '적극적인 어프로치와 의지력으로 원하는 사랑을 이룰 수 있습니다.',
                    '여교황': card.reversed ? '감정을 숨기지 말고 솔직한 마음을 표현하세요.' : '직감을 믿고 마음의 소리를 들어보세요. 내적 지혜가 답을 알려줄 것입니다.',
                    '연인': card.reversed ? '관계에 갈등이나 선택의 기로에 있습니다. 신중한 결정이 필요합니다.' : '진정한 사랑을 찾거나 현재 관계가 더욱 발전할 것입니다.',
                    '죽음': card.reversed ? '과거의 상처나 관계에 매달리지 말고 새로운 시작을 준비하세요.' : '관계의 새로운 단계나 중요한 변화가 다가오고 있습니다.'
