<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7905640648499222" crossorigin="anonymous"></script>
    
    <style>
        /* 별자리 운세 전용 스타일 */
        .fortune-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 컴팩트한 히어로 섹션 */
        .compact-hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .compact-hero h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        
        .compact-hero p {
            font-size: 14px;
            opacity: 0.9;
            margin: 0;
        }
        
        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .zodiac-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .zodiac-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .zodiac-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
        }
        
        .zodiac-card:hover::before {
            opacity: 1;
        }
        
        .zodiac-card.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.4);
            transform: translateY(-5px) scale(1.02);
        }
        
        .zodiac-emoji {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
            animation: zodiacPulse 2s ease-in-out infinite;
        }
        
        @keyframes zodiacPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .zodiac-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .zodiac-period {
            font-size: 14px;
            opacity: 0.8;
        }
        
        /* 운세 결과 스타일 */
        .fortune-result {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 40px;
            color: white;
            margin: 40px 0;
            box-shadow: 0 25px 50px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .fortune-result::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="stars" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse"><circle cx="7.5" cy="7.5" r="0.8" fill="rgba(255,255,255,0.1)"/></pattern></defs><rect width="100" height="100" fill="url(%23stars)"/></svg>');
            animation: sparkle 15s linear infinite;
        }
        
        @keyframes sparkle {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }
        
        .zodiac-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }
        
        .zodiac-header-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
            animation: fortuneFloat 3s ease-in-out infinite;
        }
        
        @keyframes fortuneFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        .zodiac-header-name {
            font-size: 32px;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .fortune-categories {
            position: relative;
            z-index: 1;
        }
        
        .fortune-category {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .fortune-category:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
        }
        
        .category-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .category-description {
            line-height: 1.6;
            text-align: center;
            opacity: 0.9;
        }
        
        .scores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .score-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .score-card:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
        }
        
        .score-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 12px;
        }
        
        .score-value {
            font-size: 28px;
            font-weight: 700;
            color: #feca57;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .advice-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.1) 100%);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
        }
        
        .advice-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #feca57;
        }
        
        .advice-text {
            font-size: 16px;
            line-height: 1.7;
            opacity: 0.95;
        }
        
        .lucky-info {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .lucky-item {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 12px;
            min-width: 120px;
            backdrop-filter: blur(10px);
        }
        
        .lucky-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        
        .lucky-value {
            font-size: 18px;
            font-weight: 600;
            color: #feca57;
        }
        
        .reset-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            border: none;
            border-radius: 25px;
            padding: 15px 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(255, 107, 107, 0.3);
            position: relative;
            z-index: 1;
        }
        
        .reset-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 107, 107, 0.4);
        }
        
        /* 로딩 스타일 */
        .loading-container {
            text-align: center;
            padding: 60px 40px;
            position: relative;
            z-index: 1;
        }
        
        .loading-emoji {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
            animation: loadingPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes loadingPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(10deg); }
        }
        
        .loading-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        
        .loading-subtext {
            font-size: 14px;
            opacity: 0.8;
        }
        
        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .compact-hero {
                padding: 25px 20px;
            }
            
            .compact-hero h1 {
                font-size: 20px;
            }
            
            .compact-hero p {
                font-size: 13px;
            }
            
            .zodiac-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }
            
            .zodiac-card {
                padding: 20px 15px;
            }
            
            .zodiac-emoji {
                font-size: 36px;
            }
            
            .zodiac-name {
                font-size: 16px;
            }
            
            .zodiac-period {
                font-size: 12px;
            }
            
            .fortune-result {
                padding: 30px 20px;
                margin: 20px 0;
            }
            
            .zodiac-header-emoji {
                font-size: 60px;
            }
            
            .zodiac-header-name {
                font-size: 24px;
            }
            
            .scores-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .lucky-info {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <!-- 네비게이션 -->
    <div id="navbar-placeholder"></div>
    
    <!-- 컴팩트한 페이지 헤더 -->
    <div class="compact-hero">
        <h1>🌟 별자리 운세</h1>
        <p>AI가 분석하는 12궁도 별자리별 오늘의 운세</p>
    </div>
    
    <div class="fortune-container">
        <!-- 날짜 표시 -->
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 id="todayDate"></h2>
        </div>
        
        <!-- 별자리 선택 그리드 -->
        <div class="zodiac-grid">
            <div class="zodiac-card" data-zodiac="aries" onclick="showZodiacFortune('aries')">
                <span class="zodiac-emoji">♈</span>
                <div class="zodiac-name">양자리</div>
                <div class="zodiac-period">3.21 - 4.19</div>
            </div>
            
            <div class="zodiac-card" data-zodiac="taurus" onclick="showZodiacFortune('taurus')">

            </div>
            
            <div class="zodiac-card" data-zodiac="gemini" onclick="showZodiacFortune('gemini')">
                <span class="zodiac-emoji">♊</span>
                <div class="zodiac-name">쌍둥이자리</div>
                <div class="zodiac-period">5.21 - 6.21</div>

            <div class="zodiac-card" data-zodiac="cancer" onclick="showZodiacFortune('cancer')">

            <div class="zodiac-card" data-zodiac="leo" onclick="showZodiacFortune('leo')">

            <div class="zodiac-card" data-zodiac="virgo" onclick="showZodiacFortune('virgo')">

                <div class="zodiac-period">8.23 - 9.22</div>

            <div class="zodiac-card" data-zodiac="libra" onclick="showZodiacFortune('libra')">

                <div class="zodiac-period">9.23 - 10.23</div>

            <div class="zodiac-card" data-zodiac="scorpio" onclick="showZodiacFortune('scorpio')">
                <span class="zodiac-emoji">♏</span>
                <div class="zodiac-name">전갈자리</div>
                <div class="zodiac-period">10.24 - 11.22</div>

            <div class="zodiac-card" data-zodiac="sagittarius" onclick="showZodiacFortune('sagittarius')">
                <span class="zodiac-emoji">♐</span>
                <div class="zodiac-name">사수자리</div>
                <div class="zodiac-period">11.23 - 12.21</div>
            </div>
            
            <div class="zodiac-card" data-zodiac="capricorn" onclick="showZodiacFortune('capricorn')">
                <span class="zodiac-emoji">♑</span>
                <div class="zodiac-name">염소자리</div>
                <div class="zodiac-period">12.22 - 1.19</div>
            </div>
            
            <div class="zodiac-card" data-zodiac="aquarius" onclick="showZodiacFortune('aquarius')">
                <span class="zodiac-emoji">♒</span>
                <div class="zodiac-name">물병자리</div>
                <div class="zodiac-period">1.20 - 2.18</div>
            </div>
            
            <div class="zodiac-card" data-zodiac="pisces" onclick="showZodiacFortune('pisces')">
                <span class="zodiac-emoji">♓</span>
                <div class="zodiac-name">물고기자리</div>
                <div class="zodiac-period">2.19 - 3.20</div>
            </div>
        </div>
        
        <!-- 운세 결과 -->
        <div id="fortuneResult" class="fortune-result" style="display: none;">
            <!-- 결과가 여기에 표시됩니다 -->
        </div>
    </div>
    
    <!-- 광고 영역 -->
    <div class="ad-container">
        <div class="ad-label">광고</div>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7905640648499222"
             data-ad-slot="1234567890"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
    </div>
    
    <!-- 푸터 -->
    <div id="footer-placeholder"></div>
    
    <!-- External JavaScript -->
    <script src="/js/main.js"></script>
    <script>
        // 별자리 정보
        const zodiacInfo = {
            aries: { name: '양자리', emoji: '♈' },
            taurus: { name: '황소자리', emoji: '♉' },
            gemini: { name: '쌍둥이자리', emoji: '♊' },
            cancer: { name: '게자리', emoji: '♋' },
            leo: { name: '사자자리', emoji: '♌' },
            virgo: { name: '처녀자리', emoji: '♍' },
            libra: { name: '천칭자리', emoji: '♎' },
            scorpio: { name: '전갈자리', emoji: '♏' },
            sagittarius: { name: '사수자리', emoji: '♐' },
            capricorn: { name: '염소자리', emoji: '♑' },
            aquarius: { name: '물병자리', emoji: '♒' },
            pisces: { name: '물고기자리', emoji: '♓' }
        };
        
        // 오늘 날짜 표시
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth() + 1;
            const day = today.getDate();
            const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
            const weekday = weekdays[today.getDay()];
            
            const todayDateElement = document.getElementById('todayDate');
            if (todayDateElement) {
                todayDateElement.textContent = `${year}년 ${month}월 ${day}일 ${weekday}요일의 별자리 운세`;
            }
        });
        
        // 별자리 운세 표시
        function showZodiacFortune(zodiac) {
            // 로딩 효과
            const fortuneResult = document.getElementById('fortuneResult');
            fortuneResult.style.display = 'block';
            fortuneResult.innerHTML = `
                <div class="loading-container">
                    <span class="loading-emoji">🔮</span>
                    <div class="loading-text">AI가 별자리 운세를 분석하고 있습니다</div>
                    <div class="loading-subtext">잠시만 기다려주세요...</div>
                </div>
            `;
            
            // 선택된 별자리 강조
            document.querySelectorAll('.zodiac-card').forEach(card => {
                card.classList.remove('active');
            });
            document.querySelector(`[data-zodiac="${zodiac}"]`).classList.add('active');
            
            // 결과로 스크롤
            fortuneResult.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // 2초 후 결과 표시
            setTimeout(() => {
                displayZodiacResult(zodiac);
            }, 2000);
        }
        
        // 운세 결과 표시
        function displayZodiacResult(zodiac) {
            const info = zodiacInfo[zodiac];
            const fortune = generateMockFortune(zodiac);
            
            const resultHTML = `
                <div class="zodiac-header">
                    <span class="zodiac-header-emoji">${info.emoji}</span>
                    <h3 class="zodiac-header-name">${info.name}</h3>
                </div>
                
                <div class="fortune-categories">
                    <div class="fortune-category">
                        <div class="category-title">🌟 종합운</div>
                        <div class="category-description">${fortune.overall}</div>
                    </div>
                    
                    <div class="scores-grid">
                        <div class="score-card">
                            <div class="score-title">💕 애정운</div>
                            <div class="score-value">${fortune.scores.love}점</div>
                        </div>
                        <div class="score-card">
                            <div class="score-title">💰 금전운</div>
                            <div class="score-value">${fortune.scores.money}점</div>
                        </div>
                        <div class="score-card">
                            <div class="score-title">💼 직장운</div>
                            <div class="score-value">${fortune.scores.work}점</div>
                        </div>
                        <div class="score-card">
                            <div class="score-title">🏃 건강운</div>
                            <div class="score-value">${fortune.scores.health}점</div>
                        </div>
                    </div>
                    
                    <div class="advice-box">
                        <div class="advice-title">💡 오늘의 특별한 조언</div>
                        <div class="advice-text">${fortune.advice}</div>
                    </div>
                    
                    <div class="lucky-info">
                        <div class="lucky-item">
                            <div class="lucky-label">🎲 행운의 숫자</div>
                            <div class="lucky-value">${fortune.luckyNumber}</div>
                        </div>
                        <div class="lucky-item">
                            <div class="lucky-label">🎨 행운의 색상</div>
                            <div class="lucky-value">${fortune.luckyColor}</div>
                        </div>
                    </div>
                </div>
                
                <div style="text-align: center;">
                    <button onclick="resetZodiac()" class="reset-btn">✨ 다른 별자리 보기</button>
                </div>
            `;
            
            document.getElementById('fortuneResult').innerHTML = resultHTML;
        }
        
        // 모든 별자리별 고유 운세 생성
        function generateMockFortune(zodiac) {
            const fortunes = {
                aries: {
                    overall: "오늘은 당신의 리더십이 빛을 발하는 날입니다. 새로운 프로젝트나 도전에 적극적으로 나서보세요. 열정적인 에너지가 주변 사람들에게도 긍정적인 영향을 미칠 것입니다.",
                    scores: { love: 85, money: 70, work: 90, health: 75 },
                    advice: "때로는 속도보다 방향이 중요합니다. 잠시 멈춰서 목표를 재점검하는 시간을 가져보세요. 성급한 결정보다는 신중한 계획이 더 큰 성과를 가져다줄 것입니다.",
                    luckyNumber: "3, 7, 21",
                    luckyColor: "빨간색"
