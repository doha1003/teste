<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>별자리 운세 - 12궁도 운세 | doha.kr</title>
    <meta name="description" content="AI가 분석하는 오늘의 별자리 운세. 12개 별자리별 상세한 운세를 확인하세요.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="별자리 운세 - AI가 알려주는 오늘의 운">
    <meta property="og:description" content="당신의 별자리로 오늘의 운세를 확인해보세요">
    <meta property="og:image" content="https://doha.kr/images/zodiac-og.png">
    <meta property="og:url" content="https://doha.kr/fortune/zodiac/">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    
    <!-- Favicon -->
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7905640648499222" crossorigin="anonymous"></script>
</head>
<body>
    <!-- 네비게이션 -->
    <div id="navbar-placeholder"></div>
    
    <div class="fortune-container">
        <div class="hero">
            <div class="hero-content">
                <h1 class="hero-title fade-in">🌟 별자리 운세</h1>
                <p class="hero-subtitle fade-in stagger-1">AI가 분석하는 12궁도 별자리별 오늘의 운세</p>
            </div>
        </div>
        
        <div class="features">
            <div class="container">
                <!-- 날짜 표시 -->
                <div class="section-title" style="text-align: center; margin-bottom: 40px;">
                    <h2 id="todayDate"></h2>
                </div>
                
                <!-- 별자리 선택 그리드 -->
                <div class="features-grid">
                    <div class="feature-card" data-zodiac="aries" onclick="showZodiacFortune('aries')">
                        <div class="feature-icon">♈</div>
                        <div class="feature-title">양자리</div>
                        <div class="feature-description">3.21 - 4.19</div>
                    </div>
                    
                    <div class="feature-card" data-zodiac="taurus" onclick="showZodiacFortune('taurus')">
                        <div class="feature-icon">♉</div>
                        <div class="feature-title">황소자리</div>
                        <div class="feature-description">4.20 - 5.20</div>
                    </div>
                    
                    <div class="feature-card" data-zodiac="gemini" onclick="showZodiacFortune('gemini')">
                        <div class="feature-icon">♊</div>
                        <div class="feature-title">쌍둥이자리</div>
                        <div class="feature-description">5.21 - 6.21</div>
                    </div>
                    
                    <div class="feature-card" data-zodiac="cancer" onclick="showZodiacFortune('cancer')">
                        <div class="feature-icon">♋</div>
                        <div class="feature-title">게자리</div>
                        <div class="feature-description">6.22 - 7.22</div>
                    </div>
                    
                    <div class="feature-card" data-zodiac="leo" onclick="showZodiacFortune('leo')">
                        <div class="feature-icon">♌</div>
                        <div class="feature-title">사자자리</div>
                        <div class="feature-description">7.23 - 8.22</div>
                    </div>
                    
                    <div class="feature-card" data-zodiac="virgo" onclick="showZodiacFortune('virgo')">
                        <div class="feature-icon">♍</div>
                        <div class="feature-title">처녀자리</div>
                        <div class="feature-description">8.23 - 9.22</div>
                    </div>
                    
                    <div class="feature-card" data-zodiac="libra" onclick="showZodiacFortune('libra')">
                        <div class="feature-icon">♎</div>
                        <div class="feature-title">천칭자리</div>
                        <div class="feature-description">9.23 - 10.23</div>
                    </div>
                    
                    <div class="feature-card" data-zodiac="scorpio" onclick="showZodiacFortune('scorpio')">
                        <div class="feature-icon">♏</div>
                        <div class="feature-title">전갈자리</div>
                        <div class="feature-description">10.24 - 11.22</div>
                    </div>
                    
                    <div class="feature-card" data-zodiac="sagittarius" onclick="showZodiacFortune('sagittarius')">
                        <div class="feature-icon">♐</div>
                        <div class="feature-title">사수자리</div>
                        <div class="feature-description">11.23 - 12.21</div>
                    </div>
                    
                    <div class="feature-card" data-zodiac="capricorn" onclick="showZodiacFortune('capricorn')">
                        <div class="feature-icon">♑</div>
                        <div class="feature-title">염소자리</div>
                        <div class="feature-description">12.22 - 1.19</div>
                    </div>
                    
                    <div class="feature-card" data-zodiac="aquarius" onclick="showZodiacFortune('aquarius')">
                        <div class="feature-icon">♒</div>
                        <div class="feature-title">물병자리</div>
                        <div class="feature-description">1.20 - 2.18</div>
                    </div>
                    
                    <div class="feature-card" data-zodiac="pisces" onclick="showZodiacFortune('pisces')">
                        <div class="feature-icon">♓</div>
                        <div class="feature-title">물고기자리</div>
                        <div class="feature-description">2.19 - 3.20</div>
                    </div>
                </div>
                
                <!-- 운세 결과 -->
                <div id="fortuneResult" class="fortune-result" style="display: none;">
                    <!-- 결과가 여기에 표시됩니다 -->
                </div>
            </div>
        </div>
        
        <!-- 광고 영역 -->
        <div class="ad-container">
            <div class="ad-label">광고</div>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7905640648499222"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>
    
    <!-- 푸터 -->
    <div id="footer-placeholder"></div>
    
    <!-- External JavaScript -->
    <script src="/js/main.js"></script>
    <script>
        // 별자리 정보
        const zodiacInfo = {
            aries: { name: '양자리', emoji: '♈' },
            taurus: { name: '황소자리', emoji: '♉' },
            gemini: { name: '쌍둥이자리', emoji: '♊' },
            cancer: { name: '게자리', emoji: '♋' },
            leo: { name: '사자자리', emoji: '♌' },
            virgo: { name: '처녀자리', emoji: '♍' },
            libra: { name: '천칭자리', emoji: '♎' },
            scorpio: { name: '전갈자리', emoji: '♏' },
            sagittarius: { name: '사수자리', emoji: '♐' },
            capricorn: { name: '염소자리', emoji: '♑' },
            aquarius: { name: '물병자리', emoji: '♒' },
            pisces: { name: '물고기자리', emoji: '♓' }
        };
        
        // 오늘 날짜 표시
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth() + 1;
            const day = today.getDate();
            const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
            const weekday = weekdays[today.getDay()];
            
            const todayDateElement = document.getElementById('todayDate');
            if (todayDateElement) {
                todayDateElement.textContent = `${year}년 ${month}월 ${day}일 ${weekday}요일의 별자리 운세`;
            }
        });
        
        // 별자리 운세 표시
        function showZodiacFortune(zodiac) {
            // 로딩 효과
            const fortuneResult = document.getElementById('fortuneResult');
            fortuneResult.style.display = 'block';
            fortuneResult.innerHTML = '<div style="text-align: center; padding: 40px;"><div style="font-size: 3em; margin-bottom: 20px;">🔮</div><p>AI가 운세를 분석하고 있습니다...</p></div>';
            
            // 선택된 별자리 강조
            document.querySelectorAll('.feature-card').forEach(card => {
                card.classList.remove('active');
            });
            document.querySelector(`[data-zodiac="${zodiac}"]`).classList.add('active');
            
            // 1초 후 결과 표시
            setTimeout(() => {
                displayZodiacResult(zodiac);
            }, 1000);
        }
        
        // 운세 결과 표시
        function displayZodiacResult(zodiac) {
            const info = zodiacInfo[zodiac];
            const fortune = generateMockFortune(zodiac);
            
            const resultHTML = `
                <div style="text-align: center; margin-bottom: 30px;">
                    <span style="font-size: 4em;">${info.emoji}</span>
                    <h3 style="margin: 10px 0;">${info.name}</h3>
                </div>
                
                <div class="fortune-categories">
                    <div class="fortune-category">
                        <div class="category-title">🌟 종합운</div>
                        <div class="category-description">${fortune.overall}</div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0;">
                        <div class="fortune-category">
                            <div class="category-title">💕 애정운</div>
                            <div class="category-score">${fortune.scores.love}점</div>
                        </div>
                        <div class="fortune-category">
                            <div class="category-title">💰 금전운</div>
                            <div class="category-score">${fortune.scores.money}점</div>
                        </div>
                        <div class="fortune-category">
                            <div class="category-title">💼 직장운</div>
                            <div class="category-score">${fortune.scores.work}점</div>
                        </div>
                        <div class="fortune-category">
                            <div class="category-title">🏃 건강운</div>
                            <div class="category-score">${fortune.scores.health}점</div>
                        </div>
                    </div>
                    
                    <div class="fortune-category">
                        <div class="category-title">💡 오늘의 조언</div>
                        <div class="category-description">${fortune.advice}</div>
                    </div>
                    
                    <div style="display: flex; justify-content: space-around; margin-top: 20px; font-size: 14px;">
                        <span><strong>행운의 숫자:</strong> ${fortune.luckyNumber}</span>
                        <span><strong>행운의 색상:</strong> ${fortune.luckyColor}</span>
                    </div>
                </div>
                
                <div style="text-align: center; margin-top: 30px;">
                    <button onclick="resetZodiac()" class="btn btn-secondary">다른 별자리 보기</button>
                </div>
            `;
            
            document.getElementById('fortuneResult').innerHTML = resultHTML;
        }
        
        // 모의 운세 생성
        function generateMockFortune(zodiac) {
            const fortunes = {
                aries: {
                    overall: "오늘은 당신의 리더십이 빛을 발하는 날입니다. 새로운 프로젝트나 도전에 적극적으로 나서보세요.",
                    scores: { love: 85, money: 70, work: 90, health: 75 },
                    advice: "때로는 속도보다 방향이 중요합니다. 잠시 멈춰서 목표를 재점검하는 시간을 가져보세요.",
                    luckyNumber: "3, 7",
                    luckyColor: "빨간색"
                },
                taurus: {
                    overall: "안정적인 운세가 계속되고 있습니다. 꾸준한 노력이 결실을 맺기 시작하는 시기입니다.",
                    scores: { love: 75, money: 85, work: 80, health: 70 },
                    advice: "변화를 두려워하지 마세요. 새로운 시도가 더 큰 성장의 기회가 될 수 있습니다.",
                    luckyNumber: "2, 6",
                    luckyColor: "초록색"
                }
            };
            
            return fortunes[zodiac] || {
                overall: "좋은 하루가 예상됩니다. 긍정적인 마음가짐으로 하루를 보내세요.",
                scores: { love: 80, money: 75, work: 85, health: 80 },
                advice: "오늘은 새로운 시작을 위한 준비의 날입니다.",
                luckyNumber: "1, 9",
                luckyColor: "파란색"
            };
        }
        
        // 별자리 선택 초기화
        function resetZodiac() {
            document.getElementById('fortuneResult').style.display = 'none';
            document.querySelectorAll('.feature-card').forEach(card => {
                card.classList.remove('active');
            });
        }
    </script>
    
    <!-- AdSense initialization -->
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
